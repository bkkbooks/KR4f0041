body:
  text: 因園集巻一左贊善趙執信撰并門集督亢懷古燕丹昔逃秦身免怨未雪千金求死士快意期一決徒逞匹夫憤焉知霸王烈我聞燕先王築臺市駿骨晩得昌國君雄心一朝豁全齊七十城紛如槁葉脱但隆郭隗里不灑田光血豈有熊羆臣輕試虎狼穴可憐易水上壯士衝冠髪事敗國旋亡寂寞名未滅陘陽驛雨甚行橐皆濕輿中聊述欲知肩輿行遇雨有似曳尾塗中龜聳身延頸欲前去四足不動如懸槌搘窗欹枕雨脚入紛斜一任西風吹我既衣裳有霑濕迴視我僕嗟亦疲幸餘臟腑未湔濯豈免涕淚同淋漓無因天漏藉石補反思油衣以瓦為人生有情每無厭遨遊謂樂居可嗤請看行役足辛苦他時枯坐無庸悲道傍碑道傍碑石何纍纍十里五里行相追細觀文字未磨滅其詞如出一手為盛稱長吏有惠政遺愛想像千秋垂就中行事極瑣細齟齬不顧識者嗤徴輸早畢盜終獲􅓺宫既葺城堞隨先聖且為要名具下此黎庶吁可悲居人遇者聊借問姓名恍惚云不知住時於我本無恩去後遣我如何思去者不思來者怒後車恐蹈前車危深山鑿石秋雨滑耕時牛力勞輓推里社合錢乞作記兎園老叟頤指揮請看碑石俱甎甃身及妻子無完衣但願太行山上石化為滹沱水中泥不然道傍隙地正無限那免年年常立碑獲鹿至井陘道中三首城邉沙水路數里入山村髙處雲封屋秋來草没門牛羊緣澗逺童稚避人喧却聴樵歌返前峯日已昏驅馬指榆水村名晩陰山雨來前村一㸃火倦客意悠哉猶隔數峯逺還從深樹迴暗中聞犬吠始見竹籬開曉日不照地羣峯方障天行人聴雞起鳥道接河懸逺樹猶藏雨髙城半出烟秋來無限思牢落付山川井陘道歌晩雲挾雨風不休井陘古道行人愁未知駐足竟何處羣山來往相遮留初縁細路行逾上風中一線秋空浮徑迴兩壁競竒詭坐令谿谷成深幽久行祗畏前路絶下視尋丈何能投失勢忽落不自覺天宇頓被蒼厓收四圍樹石怒相向森然拏攫紛蛟虯人如迴飈激下葉馬擬古棧穿猿猴已覺心氣俱沮䘮敢云追躡窮㝠摉嗟乎絶險天所設左車當日真良謀如何旗鼔走水上戲下反致成安頭古來成敗兩寂寞山川滿目増煩憂道傍戰壘野花放雨餘山鳥鳴啁啾宿平定州雨竟夜聞七十二河水大至倦行得投憇如鳥有棲託下馬衣盡霑入門歩猶却屋角張明鐙晩炊具藜藿取足供醉眠濁醪恣深酌窈窕青玉峽迢遥夢中約如何就枕憂反遜據鞍樂入夜殷雷喧雨聲亂城柝汍瀾散簷溜浸淫到帷幕頗聞向曉行驛路縁澗壑石齒既叢生潦水正噴薄四山懸瀑集勢若崩厓落直恐穿山脅安能容畧彴已知前路難更聴雨勢惡殘更逺欲㫁冷熖濕不著轉畏天欲明孤吟向索莫涉七十二河犯曉指前途天清雨氣散迴瞻孤城際遥出大河岸山勢鬱屯雲水聲激流電波盪巨石奔灘坼地軸轉居人能嚮導小駟頗趫悍揚鞭亂流去直與驚湍戰圓浪欲没鞍輕漚時及面浮沉遡衆川攀縁望絶棧豈惜衣履濡寧辭登涉倦斜陽向晩放驛舍炊烟亂有如異國歸遥天見鄉閈馬飢僕亦痡水盡山未㫁候吏不須迎前馳已如箭晩發芹泉驛夜過壽陽日暮憇芹泉暝色動諸嶺路紆未擬停馬飽方思騁新月乍微茫羣星半耿耿逺雲時作陰積雨正多濘地明知近河徑轉畏逢穽不知幾里遙忽在萬峯頂陰陰俯厓際簌簌亂林影深谷聚豺狼澗潦喧鼃黽山腰忽一燈鬼火出埳井秋毫皆易驚觀聴何由屏風髙溪壑哀露下衣裳冷前途漸逶迤客心轉虚迥昏眸呼不開倦轡時復整夀陽城上鐘殘夢三更醒夜度黄嶺星稀月落夜轉昏黄嶺嶺上寒生雲憑虚直上二十里勢與天闕争中分我行但覺馬人立據鞍自笑如孤猿前驅已逺後相失空餘呼嘯風中聞昨聞此嶺真險絶頓愁無翼難飛翻瞢然登降無所懾夜氣為我留精魂泥路蜿蜒勢漸下俯聴雞犬囂荒村東方放曉日欲出却望天際危此身中秋夜秋氣驅殘雨空庭來逺颸一杯桑落酒半夜月明時久客嫌宵永初寒覺醉遲還將蕭瑟意遙與菊花期太原縣拜先曾大父生祠三首曾大父昔為少參均晉祠水利有徳於民故祠焉祠鄰大佛寺楹間有觀察叔祖奉使時所題詩曉色微分秋暮天村烟祠樹正清妍逺山雲氣日初上古寺梵聲鐘共傳下馬身從千里外登堂夢隔十年前他鄉歳晩增多感酹酒臨風一愴然當年棨㦸駐河干片紙能令萬戸歡曽向清流照顔色到今白叟識衣冠村荒亂木隨秋下山逼驚風盡日寒嵗序易遷遺廟在居人珍重後時看憶從薄宦客京師邱墓松楸入夢悲乍喜家山歸有日又來汾上住經時兒孫枉灑天邉淚父老能留去後思待向故園兄弟道他年重問舊題詩方圖便道歸省雨中泛汾水感興細雨已作泥微風能漾舟𣺌𣺌入汾水悤悤懷勝遊漢代昔巡幸畫舸張龍斿冠葢擁前列簫鼓横中流棹歌今歇絶千載長清秋我行望天末雲物慘不收羣山莽迴互水木相綢繆地勢亘終古世事隨浮漚乃知前人名翻藉山川留舟人理楫急及岸還夷猶把杯酹水涘此意空悠悠九日晉祠野菊霜姿向客妍孤村木落更蒼然也將世上黄塵面來對山中碧玉泉桐葉遺封還百里晉陽王氣已千年爽鳩東望堪憑弔都付西風落照邊將遊鑌鐵院以病不果古院不一遊虚作并州客寒鐵夜有芒秋井水無色病思清冷對夢覺鐘梵寂想見静中僧時時掃苔迹發太原青烟一㸃望依然馬首蒼茫又著鞭此地空斟桑落酒故園已過菊花天薄遊歳月清霜候歸路闗山黄葉前惟有離心汾水上應隨秋雁共年年晩行雨脚背城見前村開晩晴近山風轉急隔水月初生樹杪懸燈火烟中隠碓聲今宵魂㫁處野館醉三更郭有道墓下二絶句斗筲賤役良不屑識鑒人倫亦偶然何意舟同李元禮時流解望作神仙中郎無愧至今稱因憶昌黎豈近名不是髙文能諛墓黄金何處夀劉生冷泉闗霜凝疎樹下殘葉馬踏寒雲穿亂山十月行人覺衣薄曉風吹送冷泉闗曉過靈石曉色依微嶺上横望中雲物轉凄清林收宿霧初通日山挾迴風盡入城客路逺隨殘月没鄉心半向早寒生驚鴉滿眼蒼烟裏愁絶戍樓横吹聲國士橋橋上馬嘶破殘月溪邊流水聲幽咽風迴激浪上橋頭似濺當年擊衣血伏劍如飴豈顧身至今此地留精魂由來國士自千古試問中行是衆人始雪過東西塢二嶺天陰覺曉遲乍雪山更寂蕭槭絶人烟蒼茫入寒色林空逺望通徑轉迴峯逼二嶺鬱相當中見雲氣積髙風束四山㝠㝠接天白行人躡空濛馬足畏偪仄忽疑厚地傾又覺陰厓踣澗壑何深幽云是虎狼宅地險念身孤客久知時迫故山候尚温奮飛無羽翮向暝昧所投浩然促輕策沁水使院望石樓山雪孤峯壓城頭雪色落屋瓦髙堂收衆陰目極天四下空烟寒欲開晩雲散如㵼逺見羣山來莽莽亂奔馬長松分巖谷猛虎憑城社入夜風怒號居人畏中野行役良苦辛山川自蕭灑悵望聴深更躊躇引杯斝陽城夜飲髙館張燈天向昏山城打鼓曉逾喧不知酒力誰深淺一夜開簾雪沒門山行雜詩四首嶺路盤盤行欲迷晩來霜霰忽凄凄林間風過猶兼葉澗底寒輕已作泥馬足蹙時疑地盡溪雲多處覺天低倦遊莫訝驚心數歳暮空山鳥亂啼晩雲忽散見峯巔逺寺鳴鐘思悄然積雪更宜新月照輕烟不障暗流懸行同宿鳥趨林急穏羨山僧擁絮眠正好溪風送前路一燈明滅戍樓邊絶巘平臨逺目開天風吹我離去聲氛埃路於殘雪消中見人自羣山闕處來樹外連峯横作鄣馬前雲氣散成堆平生蠟屐㝷幽興落日登髙首重迴十日山中汗漫行山雲作意變陰晴連天細雪因風急近郭空烟接日生鞭影逺牽殘照色馬蹄寒踏㫁冰聲定知此後相思處贏得清樽夜夜傾發澤州宿星軺驛盡日行太行最深處出郭未十里陟嶺凡幾盤徘徊初日影隠見羣峯端遙空斂餘陰山風増曉寒我行曽冰中仄徑愁躋攀馬壓後人頂足滑不得安縈紆自信地倒側惟隨鞍久依懸厓轉每疑絶壁穿歘同鳥上下紛與雲勾連平臨衆皺出旁見髙天寛四山森列笏戢戢争荒烟林木接蕭瑟萬壑寒聲傳牛羊入殘雪蠕動叢莽間登頓倦行侣曠覽開心顔日晩見人家列屋縁層巒斜陽明萬瓦烟火動夕餐不厭野宿孤益羨山居便溪黑虎豹嘷月出烏鵲還歳晏逺為客中宵起長嘆天井闗試凭雄闗望偏増客意豪驚風吹澗直落日覺山髙亂樹入雲盡悲禽分野號從來爭戰地覽古首頻搔下太行入河北萬山圍馬首崚嶒行相逼如入稠人中倉皇亂迎揖連朝躡危險徒侣疲登陟曉看白日近漸覺山勢急前路紛羊腸下赴將何極眼明見平地河色漾寒碧浮雲千里通清流一線直參差散林莽指㸃辨城邑久行望彌真屢下境轉偪迴視髙峯顛一一詫所歴野曠山盡收村晩天半赤向風指孤烟息此窮日力晩次清化鎮晩風亂叢竹四野青欲收回頭謝寒山臨别還夷猶孤城殘照盡雉堞隨星浮烟際聞人聲馬倦亦知投仙居行仙居亦在黄塵裏碧瓦如鱗㸃衛水衛水無聲四野愁神仙不至千夫死城頭寒日翻大旗使君來遊何委遲朝朝鼓吹沸城出借問曽與仙靈期仙靈窟宅知何處海天茫茫隔烟霧盡將膏血作樓臺留與行人自來去蘧大夫墓車聲轔轔及闕止衛靈夫人識君子可憐荒土不分明千古彌瑕共埋死因知往蹟多湮沉下馬陌頭霜草深尺寸偶然留姓氏武公康叔𣺌難尋大名霜樹迷離擁戍樓寒風近北倍颼飀英雄河􅃋銷亡盡獨倚斜陽指魏州魯連村咏魯仲連漫說帝秦片時事獨憐排難一生心空驚玉貌圍城裏東海茫茫何處尋華山行跛者御跛者登婦人帷房聞笑聲笑聲未絶晉師興華不注山干青㝠山前東畝何縱横欲尋丑父易位處華泉之水今猶清紀甗與玉磬差異城下盟寡君奉親以色養豈意社稷將隨傾嗚呼寧獨巧笑能傾城雜詩五首作客一朝歸如夢久而寤時時心目間惝恍各有遇遶溪清淺流連村逺近樹兒時所經覯半猶存其故峩嶺雪乍晴烟斂萬家曙磴道入髙寒雲山逺迴互忽驚風景真轉恐遨遊誤漸多相識人踟蹰屢狂顧遙見西郭門疲馬趨如騖莫避市上塵去此十年路峩嶺山名羈棲空計日客遊常畏人豈意廣坐上復覩平生親再拜視顔色悲喜不可分長者酌我酒相問逓殷勤童稚不相識牽衣皆弟晜自憐語音變稍有形容存且與恣歡讌艱難安足陳雪後天氣佳選勝擕我友不知山與泉頗憶疇昔否城邊初日上寒色遍林藪行縁荆山足漸出秋谷口淺瀨漾輕氷空烟散枯栁更陟峩嶺顛極目盡諸有峯壑雜樓臺出没各為耦疑是太行中西望頻搔首風土有雷同取意分薄厚笑問同遊人還勞倒尊酒招我何碌碌家家春酒熟朅來二十日日日得所欲風霜雖苦辛醉飽亦酖毒昨宵雙眼昏輾轉羞明燭向晨昧冠履對案廢篇牘妻孥頗嘲訕客至每局促憶登并州塞逺窮千里目祇恨杯酌疎在家病良足髙堂張華燈少長各為羣寒風歛殘日氣候晼如春酒行更相勸既醉情彌敦豈辭今夕醉將為明年人非徒明年人復是異地身預憂西北路冉冉隨浮雲住日殊未厭去意方恐分人生苦樂情終古何時均因園集巻一
