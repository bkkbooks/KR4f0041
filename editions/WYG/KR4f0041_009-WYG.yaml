body:
  text: 因園集巻九左贊善趙執信撰浮家集仲冬携家南發似有風塵負重教惹病顔殘年累妻子多故厭家山舊夣江湖杳荒程雪月間溪聲逺相送擬問㡬時還乗月下扶羊嶺口號新醅寒送甕頭香絮被羊裘煖覆牀窗際分明曉來月却於半嶺見㣲茫嶅陽店谿淺林荒路轉生午雞喚客入村行太山東下山無數只有嶅峯觧送迎渡沂水即目水落風髙沙滿天板橋摇動劇於船風波惡處亭亭立白露飛來乍可憐㟃峿道中示兒二絶句斜陽峯壑有無間登頓從今合放閒前路江河乆相待更迴馬首别殘山長途風物未能諳指㸃平堤小駐驂雲斷天低波動處檣竿簇簇是江南㣲雨登吳船贈内河北征人舍轡行江東舟子刺船迎一千里外聞鄉語十五年來識棹聲襆被從霑寒雨浄闗門不待曉雞鳴篷窗兒女渾相對别有天涯歲暮情淮安感舊老友遂無一人矣三日維舟楚水濱重城出入劇酸辛乍過衢陌疑前路㡬歴門庭失故人便恐蒼山都化冢賸憐碧海未揚塵不辭忍淚還同醉年少争依隔世身抵揚州己丑至亦以暮冬霧外風生日上遲湖氷如鏡一帆馳十年重入揚州夣殘雪東門繫䌫時贈老友王羲文心貎日髙古生涯長困窮繁華遺俗處風雪閉門中詩格年俱老雄情酒並空祗應携麈尾隨我向江東題王竹村詩巻二絶句蜀遊及與曹棟亭鹺使唱和二集愛君温潤足詩情試把新詩眼倍明西笑悠然識風格峨嵋迴暎蜀江清横槊襟情憶阿瞞不教詞客喚粗官庭柯引得東方鳯却與羣鷗一例看旅舍苦雨北人憚船居失喜入城市誰知屋三間仍與船相似東偏啓門徑西頭著妻子就中容一席狼藉堆衣履僮僕隠墻隅坐卧雜徙倚是時天隂寒十日雨不止荒庖斷續烟敗砌淪漣水窺天如墜淵墐户每堅壘行蹤脱塵垢客夣困泥滓扶杖出何縁揚帆興翻起飛書問舊故恍忽半生死鶴語悲千年海勢限萬里中路滯留難遥期嵗華駛佳霽恐無時因風徑南指晴夜發舟殘雨將寒泥客程好風送夜似多情布帆載得揚州月直到江頭看放晴渡江指金山示舟中曉帆翩翩下瓜歩風引鳴鉦入江霧亂霞紅與日留連寒浪碧於天晩暮輕舠平進疑不前後岸濳移驚屢顧中流水落見瀠洄大海潮歸罷馮怒長年舞櫂指南徐稚子登艫迎北固金山獨立出江妃翠袖明妝澹容與髙樓綺疏迷故棲欹磴彫闌敞仙路可能劃境絶遊人便合將家就中住奔牛道中大雪北風吹船船欲裂萬里寒門吼飛雪空濛江國氣惨悽宛轉河流氷斷絶避地南來惜病身圖於煖日漸相親嚴寒隨我不相捨蝟縮蟲號惱殺人風雪泊胥江三日憶昔初維吳地舟胥江烟雨沉清秋十年浪迹經三度花月迷離和夣去而今衰疾尋前轍滿眼江山對騷屑空將賀監酒邉身來卧王猷篷下雪大船小船寒不移城扉半掩聞流澌欲問城中誰在否故人三日不相知重寓葑溪雪擁葑溪駐短橈城烟巷日未蕭條當年冒雪行吟客白髪人扶過板橋辛丑元旦墜漢有還星乗秋見聚螢判年連雨雪隨客具家庭暮齒燈辭夜鄉心酒注瓶比鄉吳語沸夣覺不中聴二日南村以小舟見邀冒雪至其寓齋晤汪叟共飲因談出世之事屋埋袁安雪巷絶陳平車偶縁剡溪棹直造彭澤廬客情怳未寧春氣惨不舒㫖酒暢夙契清言探至虚坐中老臞仙妙義宣最初將遺黄石履聊發青囊書塵網我自縛枯株今見嘘因貧遂疏澹藉病成掃除况逢膠漆交各保衰殘餘動静與世隔形神將道居巖壑理可恃洞天望非紆推篷即林屋浩然同所如陳傅巖宅飲滄酒二首故人藏美酒相待㡬經年握手春風裏銜杯暮雪前清談抽别緒紅燭粲華顚莫覓當時醉滄津意𣺌然香歸澹漠色歸空吳越甜濃拜下風借問當筵賞心侣何如北士到南中南村同舟至虎邱訪汪叟平江小艇如浮蟻誰知中有天隨子虎邱比屋如聚蠅誰知中有安期生春風吹來作賔主倐然世外成將迎斟酌橋頭沽濁酒閉門各哆談天口松雲盡處波濤多從今扶曵頻相過吳中多見故人南來問舊屢澘然賸喜交遊此地偏鬚鬢蒼黄驚雪後觥籌明白聚燈前不愁落日還聞笛肯向空江却棹船得結漁菴傍臨頓撈蝦乞米擬終年亡友顧小謝之子長成示以四韻帝京詩結契甫里客依棲徃事人俱盡遺孤我獨携行年近文賦學語避家雞赤驥非凡種無輕萬里蹄旅舍苦寒溪邉一區屋瑣碎似蜂房曉日不入牖天風常撼牀摉囊失裘褐携㓜訴凄凉穿地燃山火春温属故鄉門人李定洛爲余僦得陳氏西園兼具器用遂移居之頗有池亭竹樹客遊如躡空所倚在同好不有磊落人緩急焉可料中吳舊知己文酒萃衆妙何期援鳴琴徃徃發苦調子從天上來爲我濟枯槁黯黯寒霧中孤光耿相照餉遺嵗事修招邀旅愁掃旁舍僦閒園水樹春􅌄窱野性嗜幽寂羸軀容簡傲幸能亭子雲奚必宅安道况復盛供張老屋開新燿既徙忽如歸婦子喧語笑髙樓臨廣池卧起得登眺快心乃不翅沉痼倘終療諸羣尋聲至有時挈榼造請子爲涖盟從容理歌嘯寓樓見梅花春綻池邉向煖枝㣲香初送暮窗知不縁積雪相欺得坐到樓西月暗時風雪寒甚聞鄧尉梅花盡矣遂罷同遊之興簡南村人生惟有登山臨水可自由興至即徃無所求鄧尉梅花繫魂夣况與好友期同遊先期十日具小舟北風旋春作臘月十日乃有九大雪凝氷黏地雲凍天城郭愔愔櫓聲絶小庭一樹梅始花枯條殘蕊臨池斜遥想太湖三萬六千頃寒氣浩汗山難遮含香藴玉無限樹摧林掃地一一成泥沙與君對酒空咨嗟君既低頭就塵累我又跬歩苦不遂眼前何處容快意不如徑出人間世聞尚有遊鄧尉者寄訊絶句坡公偏趁未花來白傅誇稱愛半開何似寒風送孤棹湖山尋徧爲殘梅食河魨六韻近體水族有殊珍逢春乃一薦空懐酖毒資豈免烹炰獻玉筯撥羣羞彫盤厭芳宴濃香越女愁軟美江瑶賤天使並蘆生人常輕果諫寧知惜命翁談虎容顔變園中桃花頗盛仙源無處訪桑麻閒㸔漁郎引路花忽憶春山新雨後斜陽屋角㪚紅霞春長暮行良辰佳事春三月惟有江南最闐咽綺羅絃管如屯雲此意要令天上聞天上寒深積氛霧星沉日晦雷霆怒争知勝地隔烟波别是人間行樂處閒居有客夣驚迴醉倒花前更舉杯再拜青春願長暮年年夏日不湏來贈李客山始與李生言世味一何寡既見所爲詩乃知真静者棲神入恬澹肆力薄風雅古意黙已領孤懐間自冩此邦盛人文千載非茍且自從科名張不覺江河下邇日尤波靡篇章但土苴誰識荆山珍潜待連城價我來披荒蕪獨立賞蕭灑晨夕樂居村茗香期結夏松陵烟月新擬續昔吟社相贈無常辭願得白與馬和陸耔宜止園感舊小謝别業也在支硎山下西莊秋月憶流連舊夣輕抛二十年魯望有居臨鶴市道林無冡近寒泉桂叢人㪚香歸水芸葉庭空翠化烟腸斷稽康鍛時侣殘春獨憇竹林邉即事竹裏幽禽弄曙聲短衣携杖繞籬行荷錢貼水田田㪚榴火烘枝的的明案上鵝溪憎廹促門間狗竇罷逢迎園林未是陶家物莫遣蓬蒿滿徑生夏日甚寒池上春光去不留凉風作劇入深秋今年凖擬稱髙士垂釣㸔披五月裘調南村憐君乆客去留難幕燕檣烏強自安出苦舟車天積雨衣空紗縠夏多寒人情公叔堪成論仙路淮王未就丹猶有金門詩酒伴却從流落奉清歡㣲雨出望齊門飛禽有來去乆客亦樊籠出郭烟樹好臨波心眼空遊蹤迷細雨徃事入迴風欲上城樓望鄉闗碧海通蠡口扁舟吳越恣廻環賸弔遺墟杳靄間一種鴟夷隨水去濤江號怒五湖間雨大甚小舟不可前野泊蘆中遥寄寓舍濕烟争歸蠡口樹斜照不開烏目雲風和雷電一時至雨與天水難可分篷席全収幄幕用菰蘆合䇿堂皇勲行人此行幸安穏破冡馳書相報聞暮抵常熟止翁秋允齋與陶改之夜話滿山青翠半城烟舊客來停日暮船還向髙齋展長簟頓驚小友入中年存亡虚憶風過牖身世難憑雨暗天蠟燭有花如觧笑杯中興亦减於前飲改之齋中觀其近筆數首余以戊午秋與改之先君子師先生訂交濟南積隂垂天天在夣城市沉沉息迎送故人開徑掃荒苔破曉相邀見情重門前池漲欲侵扉屋後山雲每穿棟當窗横几堆圖書坐我如陳怪石供雲中飄堕惜斷鴻濟上追攀懐老鳯名成了與事無闗身退要令心有用新篇出視倦眼明恍忽晴曦照浮動始驚題目託迂闊漸識精神工錯綜古史披開大木叢遺經匯入奔流衆䇿安太傅涕空揮引罪舍人言屢訟嗟我老大獵虛名俛仰執鞭隨屈宋偶逢快士通唱詶敢向名山藏怨諷輸君才更富於年努力詞塲縱飛輕竹林勝侣衝泥來永日歌呼雜嘲弄中郎秘賞潜夫論公子㸔成酒德頌狂酣不怕雨翻盆夜分卧近牀頭甕王西澗招飲見余風鳶之什病其一字喜而易之即席呈謝誰解攻吾短平生君尚存便應師一字何減和千言古道浮雲薄風詩野水渾髙歌空郢市下客滿齊門善病知方藥離居重酒尊終期來卜宅細律老同論登超然閣望虞山方苦雨不得遊棟宇開向山雲烟坐盈閣良朋許追攀美酒恣盤礴清言殊未厭長眺忽不樂荏苒十六年英靈責前約嵐光見掩暎瀑水想噴薄幽蹤石崩奔清夣松拏攫霪霖故遮籠病客就束縛無計限籃輿何心任芒屩似聞破山院已失昔蘭若勝境亦靡常今兹儼成昨諸君意惓惓留我縱歡謔新霽指佳期逡廵未能諾鈍吟馮先生宅感懐二絶句青山一掩子雲居風􅉡松門雨漲閭破屋時聞吟嘯苦諸孫寒餓抱遺書間世鍾期強聴琴潜依流水冩㣲音敝廬未解相料理枉被名卿妬範金阮亭司冦謂余尊奉先生㡬欲範金事之爲不可觧爲求書者所苦戯題長句童年弄筆學臨池形状乖離寧自知一朝逐隊玉堂上惡札人誇我不譲同時能書千百家一一揮斤稱大匠鍾王連車顔柳棄孟津穢解華亭貴金針闇度香泉生垂手迴腰作妖媚人間惟有上黨馮石室秘法傳來工遺書拜讀恍夣覺却笑舉世皆摶風癖躭苦學今白首心目分明難上手更趨世好乏精專賸與吳興給奔走昔賢歴歴如星雲紙墨黯澹餘精神粗知布置亦無益生氣頓盡真死人長史㣲言靳要妙時流但解求姿貎未經入室數家珍門外品題徒絶倒狥名好事忘我疾腕脱眼枯復何必諸君且休共我談老馬識途猶尚堪飛魚殺兎日有事㧞旗穿札誰能嫌不然老夫將逃矣明日衝風摧挂帆閒園偶疾倦遊偏覺嵗時徂歸計荒唐夢亦無僻處閉門饒水竹客中卧病對妻孥拙謀未就尋山誌豪興甘辭貯酒厨喜與壺公近相識㡬將藥物遺潛夫喜門人仲生至昰保字􅃵梅常熟人積日相求人不知但云家在海之涯扁舟還似山中至正是去年相見時送南村之金陵薊北遥聞日倚閭浙東消息近何如長江有夣交加路頳尾休令更寄書中秋細雨夜泛虎邱㣲風和雨裊輕舟仙侣相將耐夜遊澹泊月光渾嚮曙凄迷燈火更冝秋縁溪越舫喧殘醉夾岸秦簫倚妙謳爲問西成充羡否吳中自古不知愁遊滄浪亭六首碧波涸盡芰荷空落落危橋一徑通小阜孤亭渾不改石枰斜抹夕陽紅春風舊壘㡬綢繆海燕歸飛不耐秋敢是自來還自去主人終竟属湖州初闢榛蕪便結庵詩翁何意伴瞿曇而今㑹得經營巧身後剛容住一龕南禪䑓殿未全崩賸遣遊人感廢興白傅藏詩無覔處山門贏得賣茶僧曲榭深堂宛轉安朱櫺碧瓦照荒寒御書亭子喧卑外别起髙樓直北看梁苑相如故倦遊謾誇文酒擅風流平臺未是題詩處留待當筵菊部頭九日後二日與馮三躬暨泛小舟暮泊虎邱山後紅樹下溪淺山黯澹移舟薄暮時菊花殊未苦楓葉偶相知鰕菜秋行酒篷窗月對棋他鄉作重九歸日不勝思冬夜盗入寓舍取求書絹素及借來器具以去成十二韻將家爲客暑寒移老屋荒庭住故冝敢以文章充貨貝聊因水竹起籓籬舊交乞假施棐几年少過從羡墨池隔日街頭買鮭菜比鄰燈下見書帷門生匝月空邀醉開府經冬爲療飢儉嵗支吾中饋倦羞囊消息典家知辭餐每媿劉真長作劇偏逢戴苦思半夜雨聲人宴息平明晴色舍猖狓絹佳去製他人襪釡破留供稚子炊堂室空虚元自慣庖厨周歴想應嗤珠抛象㒺求何益火失参元賀莫遲猶有詩篇盈篋在肯輸光燄與偷兒因園集巻九
