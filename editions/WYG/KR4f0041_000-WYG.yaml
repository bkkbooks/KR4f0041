body:
  text: 因園集别集類六國朝提要臣等謹案因園集十三巻國朝趙執信撰執信字伸符號秋谷晩號飴山老人益都人雍正中益都置博山縣今為博山人康熙己未進士官至左春坊左賛善其詩集流傳頗夥諸本往往不同此本末有乾隆辛酉執信門人丁際隆䟦稱是秋重謁秋谷先生於因園時先生病目彌甚不作詩者六年矣從仲君羮梅得先生手定詩稿分十三集録副未及校而羮梅遽索原本以去嵗寒無事乃校一過曩見手書濟南竹枝及宿法慶寺二律皆不在葢所刪多矣云云羮梅者常熟仲是保之字為執信門人之冠最為篤契則是集為執信晩年定本手以授之者矣十三集者一曰并門集二曰閒齋集三曰還山集四曰觀海集五曰鼓枻集六曰涓流集七曰葑溪集八曰紅葉山樓集九曰浮家集十曰金鵞館集十一曰回㠶集十二曰懷舊集十三曰磺菴集集各一巻以存其舊不復以篇頁多寡為分也執信娶王士禎之甥女初相契重相傳以求作觀海集序士禎屢失其期遂漸相詬厲讐隙終身今觀還山集中尚有酬士禎詩二首又為士禎作西城别墅十三咏至鼓枻集中渡江一首已有祗應羨詩老持節問岷源句註曰謂阮翁又悼呉孝亷一首有漁洋未識名先著句其詞氣已不和平自是以還遂互相排擊則謂二人之釁生於作觀海集時其説當信迨其後沿波逐流逓相祖述堅持門戸入主出奴數十年迄無定說平心而論王以神韻縹緲為宗趙以思路劖刻為主王之規模濶於趙而流弊傷於膚廓趙之才力銳於王而末流病於纎小使兩家互救其短乃可以各見所長正不必論甘而忌辛是丹而非素也乾隆四十五年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
