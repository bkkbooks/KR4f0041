body:
  text: 因園集巻十三左贊善趙執信撰磺庵集望春曲嵗已換春不來所見惟氷雪日夕增皚皚春未來冬且乆寒威爾何苦勸爾一杯酒天地本無私盈虚合有時但臨碧池待莫怨惠風遲有感二絶句漫天飛絮落泥塗或化流萍水一隅賸向魚蝦矜覆載不知記得本根無東君劇戯喚春迴販弄羣花處處開一種風吹偶先後却教山杏妬江梅題銜月亭髙亭盡道與閒冝對雪當風酒共持輸與山翁自怡悦憑䦨月月月明時晦日大雪與仲生及子弟開南窗暢飲成雜言學歐蘇禁體閒居每愛雪助我園林幽去冬圍火坐寒意時侵裘簾隙試㣲瞰僅能没瓦溝今晨偶偕二三子林下共語春和柔颯然霰先集大至風莫収驚塵有猛氣濺沬無平流驅廹入深屋各聳山肩頭衆情殊不厭撤墐呼觥籌惟有杜康劉白墮觧與滕六除怨平聲讎南窗騁望得快意竒絶非可人間求羣峰晃朗相烘染萬樹匼匝争雕鎪石路自覆荒穢净池藻細呈青翠稠中流澹摇漾恍棹山隂舟孤亭炫突兀新成天上樓神山仙闕暫飛落但恐不爲東皇留當杯吟賞還儷事無使謝庭兒女羞猶勝令節對芳宴夜珠明月乗昏投長宵紅燭照白戰酒行與雪俱無休春如冬詩十二韻今春多雪少晴二月初旬雁猶南去擬將時序問天公半覺青春度若空斗柄指來元的的羲輪行處太悤悤年光飄忽隨流水氣候回環象引弓暘谷詎應長避地寒門猶道未成功盡収川嶽凋殘色㪚入乾坤惨淡中有信風花翻瑟縮無情雪月鎮朦朧氷山浸失支撑壯玉琯難求燮理工北户摧藏何振蟄南雲零落尚征鴻豺狼躑躅嘷溪黒兒女悲啼望曉紅深巷袁公耐枯槁敝裘晏子愛䝉茸竹爐火足能偷煖瓦缶醪香欲送窮却怪詩人縁底事雙垂冷淚向和風嘲近春花黄金偷色未分明梅傲清香菊譲榮依舊春寒苦憔悴向風却是最先迎山半花樹移就小池北栽之地髙苦風多山盡得日暖主人與春閒幽事觸何限荒園有花樹託根半􅑬嵼寒威易侵陵土脉况踈㪚滋分雨雪輕氣受天地淺秋葉早投地春花稀入眼對之喻懐抱終嵗欝不展寧辭就卑遷何處覓餘堧近於小沼北撤屋出平坦未勝數弓量猶愈一席巻通流初徧潤除石漸成窽老夫獨指揮童子競徃返朝至日中昃柯條坐來滿連朝晴和意有似故繾綣何以答恩私争妍不容緩穠華衆所欣細葉我勿翦舉頭見嶮􅇖屏跡恣偃蹇且待緑隂繁時時來洗琖栽杜擬以接梨春風暫爲䕶根芽池影先容細碎花好待他年落香雪垂垂玉乳滿貧家栽檍詩疏云官園種之謂之萬嵗幽巖逺去㔉雲移爲愛蘭芬與雪姿莫向官園争物色深山始有萬年枝大風惜玉蘭花池烟徑柳漫黄埃苦爲辛夷酹一杯如此髙花白於雪年年偏是鬬風開山徑爲塵土所埋擬疏出之三年修葺因園居造舟移亭風景殊豈免土木有委積塵灰瓦礫纒山隅清池倒影見曲折層厓幽澗愁糢糊南州髙士慣洒掃此事詎可期僮奴北風昨夜狂而急茅捲石奔水飛立掩闗塞耳意欣然將謂林巒浄如拭寧知埋没轉更多驕龍挾雨慵經過自知三徑秀而野奈此枯烟暗月何褊心忽發藍田叟盡喚鄉鄰沃以酒摉山先事㔉荆菅一日縛成三百帚暮春晦日族弟邀徃山村㸔桃花偕諸叔登髙小飲二首閒與病相守山情猶尚存桃花半開地春雨乍霑村隨水頻紆徑縁厓自識門携笻如擁棹重入武陵源髙岡出花頂坐處欲千尋風起香偏逺烟過色更深春山世人面西日老年心徃事銜杯説兒童莫厭斟即事示子弟虚閣踈林視聴清連朝偏是暢幽情墻頭柳色和山色池畔書聲亂水聲於世偶然寕復避此中有底尚難平因憐獨樂名園者却恐同心積漸生宋孫二翁見過閒居所喜在無喧日日支離學灌園已送三春如過客爲迎二老忽開門風花奄冉成黄葉霜鬢婆娑暎緑樽四海經遊總陳迹不堪倚醉一追論芍藥閲盡繁華委地空獨將姿格領薫風已􅂸富貴藩籬外漸入烟霞仿像中水畔叢深驚洛艷雨餘香重厭春工一從品作姑山雪悔向揚州識相公東坡玉盤盂詩姑山親見雪肌膚重題芍藥醖醸春光故放遲清和不失畫欄期濃香擁徑風㣲㪚艶色翻堦日半欺士女有懐充報贈君王無分領歌詞壺公偏觧相料理手植靈根近上池遣興二首草色斜侵磴道齊短笻長晝足攀躋清風發自小池上紅日移於深樹西暗水簷楹隨宛轉遥峯屐齒互髙低仙源黄髪閒相笑前度漁人到已迷心跡孤髙寄草亭昨宵新雨洗􅑐扃林風急處水争響壠麥黄邉山倍青時勢空華隨現滅勞思天地竟清寧間披書帙相闗者祗有浮邱相鶴經悲小女十載癡龍抱裏珠由來憐愛與悲俱偏工吳語從慈母苦誦唐詩向老夫昨過碧池猶弄水那教黄土便埋軀欲知學道忘情未曉枕無眠有嘆吁即目北窗坐長晝晴雨倐難分林影有無變溪聲髙下聞山深應隐日嚢澀豈容雲觧識天無定心依止觀文池荷五月已花是九家弟盆池中物去秋八月取之沉諸水而破其盆今年計可大盛報家弟訂飲賞之約園亭水木乆益佳自矜不數吳中家南頭池方一百歩其中詎可無荷花去嵗經營殊草草澄泓坐待慙魚鳥聞汝空齋荷正芬有花却値無主人呼童衝曉相輿致一朶伶俜露將墜不辭地迥近清寒且向波深作紅媚水仙從此住中央擁雪抛春飬暗香漸喜林風翻翠盖俄驚山雨洗新妝時序舒遲夏才半菡蓞離離踰舊觀從􅂸三月水雲中身墜蓮房夢淩亂知汝踈慵罷出門好乘凉月訪黄昏牀頭幸有多瓻在償取分香老瓦盆題山前破屋柁樓背倚山前溪篷窗每啓憐溪西老屋三間破如此村農乆戀成幽棲兒啼婦語當其下敗瓦殘椽莽相亞炊烟湧出雲無心天影常懸城不夜頻㸔鉏笠出復歸寧識全家在翠㣲眼中籬障撤都盡多事黄昏仍掩扉昨宵驚龍起行雨馭電排風吼雷鼓斷岸粗能撑拄牢壊墻猶得存留古敢將結構鬬鮮新風月玲瓏合與鄰但惜中非玉川子茶鐺騰沸隔波聞新蟬泉響復禽鳴閒心有底驚午窗聞嘒嘒陡覺是秋聲秋谷夜雨幽棲清夣著烟蘿奈此秋宵積雨何豈是亂泉添響急非闗深谷貯風多千峯勢極趨滄海三徑心期接絳河情興尚堪衝曉在滿林飛瀑滿溪波聞王南村於去年九月病亡酤酒秣陵市送别春江頭題詩淚隨筆已識今生休渡江滯三時所至觸君迹一自掩山扉山深斷消息知君所居處近海越帝城帝城深於海造次誰敢行仙期俱𣺌茫魂夣各疏鈍但有舊音書那覓新聞問昨日故人子緘寄津門遥當食讀未半投箸驚長號言君雖得歸生計日已寠衰病積不支委形値秋暮含悲算嵗月相識五十年應縁夙生契肺腑乆益堅出遊必逢君不限地近逺平生綴篇章憶贈他人罕交情會有盡從此隔泉扄神理如可託爲君冩道經喜晴一天風日送新歡報到秋霖興已䦨林雀聲中雙牖朗瓦松花下數楹乾崢潺澗響殘朝夣蒼翠嵐光接暮寒便可琴樽遲希逸同來賦月碧雲端送仲生南歸六十韻送别三秋逺追遊七載贏捨余非失計將父自深情江引迷漫夣山銜宛轉程眼㸔今契闊魂斷昔逢迎作客時踰夏論交嵗在庚因依聊下榻倉猝似班荆本襲師門舊生㓜受馮氏學非尋大國盟空慙我衰朽乍喜子峥嶸載酒籍恒醉稱詩郊善鳴伸眉得知巳拂袖罷求名仕路虚侯喜兒婚廹向平前驅水東返後隊雁南征岱出霜烟聳河穿霧雪横遥憐馳馬處獨聴刺船聲躑躅舟將陸逡廵雨復晴挂帆瓜歩迥僦舍越來清度嵗漏催燭懐人波漾萍屋廬連浩𣺌姓字没譏評有意歌招隐無縁訂耦耕翔蒿和斥鷃䟦浪失長鯨詎料挐孤榜還能覓老傖荒園携手晩村塾寄身輕來徃途猶澀栖遲嵗再更石間欲移栢郭外遂遷鶯地喚金鵞舘餐分玉糁羮攤書依桂緑把琖暎蓮頳氣味隨時澹心期向古澄紫霞欣可託白雪調同賡兒遣從君讀貧教與道争見多憎落落友益信硜硜旅况葭蘆厭歸心澗壑縈擬邀張翰載好慕李膺行壯齒辭親許餘春結伴成淩風上浮玉阻暑息蕪城巢羽寧知幕游鱗已在鐺傍人渾蟣蝨識客半蚊蝱滄海翻何驟流星落易驚羣言任嘲哳爾咏倍噌吰徃蹟摉牛斗生有蘇掦懐古詩各十首旋師捲斾旌賦哀周庾信脱繋晋荀罃生計從狼狽吟嚢賸滿盈希賢才避地懐土重瞻衡晨夕聨南北薫猶愧弟兄蜂房苦屯聚蟻垤強經營㔉石開千丈疏池貯一泓林隂披帳幄泉響亂竽笙室静雲常集亭髙月自呈小樓窗似柁欹榭樹爲楹底物堪諧俗於中合著卿清歡足圖史公事属杯觥佳趣兼寒暑忘機付晦明蓬蹤蜨自化塵網虎誰攖境習蕭閒慣思因寤寐生每觀辭社燕屢感坐衣螢野菊初含色靈椿正向榮行方衝落葉到及薦新秔蹔使劍離匣永懐桃報瓊話言要的的意緒結怦怦地蹙沉三島天低礙八紘何當翹皓首相望入青㝠仲生臨發再送之溪橋轉處即長途曉啓柴闗見僕夫霜送新寒入􅁭䄂人將舊夣寄菰蘆黄塵路盡波聲急紅葉庭空月影孤若向西風問歸雁三春還憶北來無九日仲生去後弟數人來登髙適有風雨夕無月不盡歡而散又明日復至同飲月下籬花入酒香初發霜樹滿山黄未匀風雨重陽元不惡减將秋興是行人清池遥暎酒杯空佳節雖過醉復同知我連朝無與語不堪獨坐月明中送菊者數人合十餘本皆云病雨故不佳對花獨酌輙題長句東籬叢花綻來乆掩暎青黄門外栁悤悤客至裹巾迎頭上淋漓灑餘酒飱英豈是擬三閭避厄寧湏卜重九偶然興與髙秋謀何物堪和杯在手愛將佳色助清吟不分拘儒能藉口自居君子託朋儕冨貴斤斤排向後雖評賢聖立等差􅌂命公侯奉圭卣幽人一笑返無名卉木縁時本芻狗比䝉好事致霜葩烘染枯寒洗塵垢漫云蕋細葉凋殘入我窗扇總瓊玖天公晴雨自年年舉世空勞競妍醜更呼缸面酹淵明謝去諸君吾與友贈善醸王生家當後樂橋嵗醸范泉水罋底畢卓眠牀頭杜康祀自言収得深山春老向其中風味真雖無仙侣逡廵術合與人間麴米親我居橋東泉遶屋年年酒近重陽熟傾杯色暎一池霜入口香分滿缾菊每臨虛柁飲秋晴羣季争誇坐客驚盡道兵厨容阮尉寧知紀叟隐宣城將以醇醪畢吾世籍手相供足酣醉醉餘飛夣海山顛舉爾蓬萊充酒吏山莊送山藥一本大於臂重㡬三斤蒸而食之累日乃盡深山積嵗飬難成便腹連朝飽尚贏誰信酥陀天上有即㸔石髓洞中生烹煎减處知心澹餅餌抛將覺齒輕更爲幽叢覓花犬殘軀擬從赤松行夜大雪口占夣傍寒林半不成宵分雪色射帷明明朝門逕知埋没聴徹窗前折樹聲題十三叔佚老庵齊年臣叔健白首嗜遺經舊著潜夫論新成陋室銘抱憐文若㓜談許阿咸聴縹緲天文裏誰占處士星大雪彌日子弟來共飲昨日至城中冐雪獨來去衣衝郭外寒屐折池邊路今朝啓扉視荒砌積已深城中人來言門巷㡬莫尋里居四十年不憶有此雪應縁心識清始見今竒絶園如水面雲黏天平不動山川與城郭盡作湖濤湧千林復萬樹殊怪不可圖紛披珠瓔珞争聳白珊瑚對之心怡曠亦覺興蕭索緬想山隂人風流竟誰託何意二三子相携陪醉遊茅簷晩吹發恍惚漾輕舟晴日即目大雪連日夜始知天地寒午晴携杖出清景不勝看山倚城髙潔池凝徑渺漫千重氷壑底賸著一袁安懐仙詩氷雪覆大地思從天上臨五山將四海晃耀復森沉鶴翅度無影颷輪行有音猶憐壺嶠客跂足發寒吟飲新酒戱成户外氷稜增刻削杯中風味足清醇不知朝暮有寒意所與徃還惟聖人兒姪同希小阮逹雲烟偏向老顚親醉鄉宻邇何湏羡欲寄和神國裏身哭四弟稼民嵗晩荆花尚滿庭一枝帶雪忽凋零長貧浪學朱公術乆病虚参岐伯經宿世心塵誤鄉里平生手迹倦丹青北風送響東陵下應供殘魂怨脊令老僧復宗來唁山僧踏雪過山翁老病同棲隙影中説著存亡渾障礙只將無語破頑空得天津書知滄洲同年劉師退健在師退㓜學禪觀童稚情親五十年浮沉蹤跡兩茫然經過初見霜生鬢相望長如月在川貧乆原思兼抱病醒多蘇晋本逃禪海山他日期携手何必求歸兠率天書又云王南村自知亡日沐浴具衣冠拜母無病而逝迷漫欲界隔仙都老向烟霞憶舊逋贏得翛然揮手去得如輔嗣守門無得仲生書及江南親友消息懐人三月意黯黯雪送深杯欲半酣接得報書翻不樂重牽離緒到江南江聲悽惻動心魂侍立兒童訝淚痕除却黄泉音響絶藥爐側畔有人存鄉人苦覓余書猶子鈎摹一幅以紿之余聞而取觀戱贈二絶句且爲書數紙己酉不擬牀頭故捉刀那將刻鵠誡兒曺十年粗識蘭亭面偷取家雞炫羽毛秋曉輕隂黯不開請君自掃小庭隈乍驚天外雲雷氣此日真龍始下來庚戌新春遥贈舊門下士公車北上在三往語底須論凖擬登朝不負恩此去汝南門下過譬如今日入東門口號茫茫塵海没天真虚谷無聲好問津延得希㣲駐靈府一心長作守門人小庭栽竹比遂成林對雨題長句王猷故是瀟灑人一日不可無此君少陵不保破茅屋必種數竿聊免俗我從山家移竹來正當醉日劚石栽比年雨多易成長新梢戢戢穿簷上摇風漾月六十竿昔時盈尺今踰丈曉隂連山収火雲乍愛林響踈踈聞七賢六逸隨流水長嘯獨搴青鳯尾阿趁週嵗戲題觀其取物先筆後劍老愛佳孫子從教溷乃公齒牙氷雪凝去聲言語栗留工提劍非吾素抽毫有父風朝朝潁川郭抱汝著車中壬子始春十有一日己巳夜夣與老翁對坐觀周易遂爲余卜得同人之遯其繇則七言絶句也既寤惟憶首句及第二韻乃足成之江聲海氣入詩瓢汨没吟魂未易招夜半東風吹夣覺鐵船元在華山椒春感年光易換似流鶯老覺心期暗不驚華屋山邱等零落風花烟栁慣清明林深自許鷦巢稳道險誰甘鼠穴争却被陽城要上考閒閒十畆意難平清明後大雪泠泠鶴語遡唐堯卯酒㣲曛抵敝貂氷雪陡侵三月迅陽春恍憶十年遥有知社燕飛飛晩無幸園花灼灼凋借問漢廷賢丙吉八荒寒徧若爲調題王臨川集熙寧名績惠惇聨千古江山氣惨然玉茗堂中詞客在始應替得謝臨川夣在吳門李萊蒿侍郎握别云肯思我者惟有君耳寤而愴然遂成絶句啼烏喚淚落江雲斷夣分明太息聞三十年中萬賔客那無一箇解思君過梁莊望澗園同二十三弟感懐之作園已鬻之俗子矣依舊飛梁接釣磯臨流清淚不勝揮髙樓長閉窗三面新冡才營土一圍駔儈有時喧酒炙兒孫無恙隔林扉屋廬迥與人俱換千嵗何由待令威弟向居他縣近始返舍雨後即目好風佳霽變園林耳目清新莫逺尋淡竹暎池千㸃黛陵苕縁霤一溝金朱魚羣作穿荷戯時鳥偏工食葚音不許老夫心便死静中牽惹發㣲吟暮秋吟望小閣髙棲老一枝閒吟了不爲秋悲寒山常帶斜陽色新月偏明落葉時烟水極天鴻有影霜風捲地菊無姿二更短燭三升酒北斗低横未擬窺癸丑上元後病中作老爲歡伯意躊躇路向窮時地有餘零落夣魂燈月後膏盲始是道人居贈日照秦生崑雪與其鄉人丁鶴亭李經五皆好學篤行逺聞海上三君子乍可三株樹並㸔一鶴翻飛臨磵户六經錯落起波瀾殘春羯鼓判花入晩道鹽車引􅂹難便合招携采芝客滄溟結隊理魚竿秦生言寧海州七真人故居烟霞洞者中有鳥其聲云歸山好令聞者作出世想至夜則杜鵑滿山悲啼不絶令人凄然腸斷道人並謂之仙禽余聞此語漫成口號世人勞夣復勞形鳥語相嘲不遣停纔喚歸山又催去阿誰觧向寂時聴明邉華泉尚書有詩云庭際何所有有萱復有芋自聞秋雨聲不種芭蕉樹前人謂其意取出象而芋非庭中之物譏爲凑韻余則謂呼芭蕉作樹乃鄉俗之言尤爲不典作者與譏者踈陋一也遂改之庭際何所有離離花藥苗自聞秋夜雨不復種芭蕉新秋園夜夜氣澄來耳觀平迎秋㡬許攪心情山泉林竹窗風外更與添將蟋蟀聲病目自嘲昬眸老尚曵心旌雲母屏風就裏生韋卓便應傳道術文昌那敢競詩名信抛大地烟花色遥接髙天日月明舊友能來慰離索醉歌猶愛有聲情秋暑口占甲寅塵氛熱惱避無門短壑層氷役夣魂無語収身北窗下清凉元只此中存記夣十月十日七十餘年不可追夣魂常與幻参差三彭昨夜故嘗我一豫從今當格誰眼已逢人混清白心猶和月變盈虧分明記得崆峒語却是無知未易知因園集巻十三
