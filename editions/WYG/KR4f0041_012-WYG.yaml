body:
  text: 因園集巻十二左贊善趙執信撰懐舊集雨中得大木遺詩題感因懐平生故人素士戀知己衰年感同心懵懵如見夣惻惻還聽琴户外波蕩潏庭中山嶔崟綿邈三十載空天落遺音向夕㣲雨過悲風生竹林當時文酒侣滿目成飄沉􅄞調恍一接阮樽誰復斟浩然望雲海獨發懐仙吟懐舊詩十首人各一小傳以相識之嵗月爲先後爾淄川畢世持公權少有雋才康熈戊午鄉書山左之文冠天下公權爲首舉余次之齊名相善後三上春官不見取其文清深幽異俗流淺識莫能窺也由是憤欎遂卒年不滿四十余仲子戇婚其小女頗知爲文年二十有八暴死女亦旋亡城西閥閲才筆力追大雅三十作觧頭一朝名天下側身睨青雲引手攀金馬詎意商羽音知希和彌寡卞玉三不售顔年終莫假寂莫長白楊斯文棄荒野我有早慧兒衆譽期終賈遭逢未清氷凋謝亦飄瓦長憶初頡頏肺肝共傾冩殘年西河淚獨爲離羣灑常熟陶元淳子師戊午之秋從翁司㓂來濟南與公權及余結交明年余留京師晨夕無間鈍吟先生遺書子師先得之轉以付余且爲賞析由是得肆其力於詩與書法子師以文自豪名日以髙性岸異自余而外無所推許時軰咸以爲狂年四十始成名詘爲縣令得海南之昌化以儒術爲治對上官無所降屈爲民除積逋著爲書指畫痛切竟卒於官憶於舞象年出交天下士得識元紫芝以免濁世恥入朝偶見容踈放每自喜推轂入髙流非君復誰恃既傳碧雲學砥礪日靡已謬竊當代名芽蘖從兹始狂聲相傾動貴勢每切齒名成身見排萬里落儋耳結束萬古心勞勞向赤子能令野雉馴不畏蒼鷹視觸忌恤民依涕泪託空紙我曾覧遺編朗抱長沙似乃使如斯人沉淪瘴海死徳州馮廷櫆大木亦鄉同年也壬戌榜進士明年授中書詩才清㧞恒與余唱和並以諸葛銅鼓詩得名阮翁稱曰二妙大木始漸於其里中及新城之習詩惟主新異疏闊唐賢後於余所聞馮氏學又熟讀太白集乆之自能成就章句與風雅相出入矣然鮮妍修飾未遂㤀也官十年不進後將遷儀曹主事未拜職一昔無疾卒於寓舍獨立諸生中才名海岱盛一出賦雪車詩豪敵盧孟時世相波靡唐風方不競各弄姿貎妍争盤言語硬君故優爲之國色新妝靚聞道厭紛華収心歸雅正壯遊渉江漢力可排茅勁幽意屬郊居義能兼比興偶以餘勇賈輙獲偏師勝遂使老涪翁絶倒爲恭敬惜哉僅中夀宵寐溘不醒豈復玉樓成赤虬闇要請更令假數年風格氷雪净並世見桓文中原誰主盟滄州劉果實提因與余同康熙己未榜榜下相見長余四嵗後同入翰林相於如同氣居數月假歸甲子授編修明年被調去遂不出提因貎白晳秀異行動如鶴坐必跏趺㓜精内典其於世味了無所繫戀三十喪妻竟不復娶意其前身盖髙僧也詩文恢詭雄辨菲薄迂儒不可以法度求之余於甲申冬過其家出滄酒共飲詞色古淡使人意消余甚媿之近聞尚無恙翛然野鶴姿不著世塵垢借問何處來夕陽一迴首三年出游戱璞玉偶然剖畢世歸沉㝠落月不可取拂衣尚朱顔扄户遂黄耉隐居大小間道在夷恵後昔傍集靈䑓嵗星暱爲友近訪華陽洞壺公沃以酒嘲弄人盡亡酣放吾何有相待浄居天無顔開笑口聞喜張克嶷拗齋自三榜入詞館無一不於余同後改官主事累遷郎中出守廣西平樂再守廣東潮州奉諱返里竟不復起其在潮也每對酒即憶余常至隕涕大醉輙呼余字曰何不來乎痛哭乆之既而果至傾囊觧贈無難色盖其性抗爽無城府與余一致故投契獨深也然不能事上官意有不合或面詬之而清惠得民其賢者每相調䕶精時藝於詩洞識佳否而曰吾不精則不爲也年垂八十乃卒太行限東西上有九折坂我腸亦如之盤迴更無算比聞君亡日墳土嗟已暵其時我滯吳天長夣魂短君昔臨南溟怪我行何緩積嵗守鄉園病深徃來嬾緬懐鱷溪旁花月麗髙館遊蹤牛斗賖歸槖象犀滿朋交今所輕髙義古亦罕悵斷買青山葱葱長在眼諸城李澄中漁村少爲名諸生其始生也父夣李攀龍入室既長能詩仍效攀龍體而差妥帖矣以薦入翰林於時宋元風氣方煽漁村獨守其故歩然學識日進彌擴而清之作者不能薄也文格下於詩二者皆謬以推余曾値余觀宋史謂曰此書湏大手筆更修之非君家事歟余辭以官况廹窘力不能獨舉恐中廢時漁村方撰五嶽志採摭甚勤竟不克就如余言與余同被論獨得解歴遷至侍講左調歸年六十餘矣未㡬卒東武利逹區君獨超以静讀書九仙顛縱目三山影前身白雪翁蛻化失麄獷子虚賦未成得意薦已幸史筆從委積詩篇浸清整與我分最深先後落機穽館閣崇聲華吳越積假請北士才天然空踈勢難並忽於羣木中千丈見孤挺垂頭讓英盼側目忌髙騁玉顔奚足恃圖畫變俄頃紫府袐瑶籖容君終主領蒲州吳雯蓮洋拙於時藝困躓塲屋中體貎粗醜衣冠垢敝或經嵗不盥浴人咸笑之而詩才特超妙余嘗比之温飛卿云與漁村同薦既試報罷其父故與阮翁同年始入都以詩投謁阮翁心折極口爲延譽而其性迂僻寡合遂淪棄終身與余甫一見如舊相識余好用馮氏法攻人之短惟蓮洋不以爲忤其作字用馮法粗知間架然不能工也晩相値於津門出詩巻見示曰曩之所攻悉删改矣乃知其非名軰所及也屬余論定余請俟異日盖其時正逢阮翁之怒不敢闌入詩壇故耳又數年蓮洋卒於家卒後其集聞送新城阮翁爲作墓誌且删定其集迄今將二十年矣而未行於世意其時阮翁耄而多㤀未㡬遂亡未及歸諸吳氏耶若然池北藏書㪚失殆盡蓮洋集從可知矣築室中條山招手玉女峯黄河遶門前滌盪萬古胷埋頭試牘中啼號羞秋蟲風騷適榛蕪揮刃侔神工脱棄范陸習踐履岑髙蹤貎似温方城才與遇並同詩老性䕶前於君禮獨隆貴遊負販豪交臂來趋風聲名天可假時命人能窮濩落王官谷穿冡連司空遺文寄池北飄㪚隨萍蓬追維平生言使我心忡忡虚疑玉溪底匣劍藏芙蓉終當沉鐡網大索蛟龍宫王官谷玉溪皆在中條錢塘洪昇昉思故名族遘患難携家居長安中殊有學識其詩引䋲切墨不順時趨雖及阮翁之門而意見多不合朝貴亦輕之鮮與徃還才力本弱篇幅窘狹斤斤自喜而已見余詩大驚服遂求爲友乆之以填詞顯頗依傍前人其音律諧適利於歌喉最後爲長生殿傳竒甚有名余實助成之不時唱演觀者如雲而言者獨劾余余至考功一身任之禠還田里坐客皆得免昉思亦被逐歸前難旋釋反得安便余遊吳越間兩見之情好如故後聞其飲郭外客舟中醉後失足墜水溺而死每笑蘇子美終身惟一蹶永抛夣華塵長嘯滄浪月千秋覓同調舍我更何人髙騫雲中鶴俯視爨下薪當時共造迷鬼神實假手委曲以相成君無道慙負羣兒旁快意一網盡無餘借問即陸者誰能免淪胥弔君水仙操置我愚公谷得失物雞蟲死生身翻覆歌塲倐已散此是無色天翩然成獨徃直上三神山長洲顧以安小謝少有才辨能爲捭闔言不屑塲屋遊南北大吏間爲幕客稍不合即捨去潛習禪觀其詩以妙悟入頗尚比興中嵗貧甚來長安依其姪以居姪在翰林中粗有文藻小謝視其詩輙唾罵且曰爾曹安得有識字者其姪病之徧索有時名者之作咸罵如前雖阮公亦不能免最後見余詩於他所擊節歎賞歸而笑其姪曰僅一人而爾又不觧奈何遂來締交後其姪以憂去小謝從河上入都囊無一錢余適亦被放過慰余了無困苦之色展轉借貰不復離輦下居數年忽携十萬金歸吳買田宅構池亭儼然素封厚遺故舊恤貧乏通賔客人莫之測也余客吳門必主其家小謝亡家亦盡矣中吳信繁侈獨恨人士少文章與意氣一風可盡掃况欲二者兼何殊來鳯鳥天生未易才舒卷形象表論詩如談禪半偈宗旨了取金如承蜩外府皆吾寶笑罵今鄒枚不畏公卿惱百倍陸賈裝挈歸一腐草宅嫌金谷奢洲引石魚小英彦聚紛紛窮交愛擾擾同舟憶微言高視淩穹昊方期彌勒龕豈羨蓬萊島離居我自憎乘化君何早寄謝闔閭城努力事醉飽餘懐一首東阿房嵩申公長清于紹舜毅齋並余三榜同年申公孝友大節余前為之傳並記其白晝見夣事毅齋一仕輒退終樂田園今尚健在頻有書來往山陽程光奎逺復豪俠丈夫誤絓憲網百萬之貲一朝蕩盡壯嵗而亡於余有恩故不欲叙述之爾舎人高獨行史傳餘欽仰精神貫良朋停午發夣想于公恣閒放非隠亦非仕生存天地間碩果我與爾程生今嘗陵下視朱與郭失足散黃金收身投碧落眼中磊落人歴歴五十年崩奔避三事牽率歸九泉古來成大名奚必懷高位揚袂指層霄泠泠起長喟因園集巻十二
