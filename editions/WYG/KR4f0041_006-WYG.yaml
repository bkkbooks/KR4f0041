  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4f0041_WYG_006-1a, image: WYG1325/WYG1325-0367a.png}
body:
  text: 因園集巻六左贊善趙執信撰涓流集天津喜晤老友吳天章兼贈其所主張君走訪吳先生因識張公子能為詩人作主人此士定知不凡矣況復接坐來觸事皆可喜開軒解衣裳留客披圖史海氣曖曖横庭除古色斑斑盈案几杯槃既雜陳談辨遂蜂起剔抉六義微錯互八法㫖門外喧闐南北塵共洗清心照秋水老我數年來袖手復掩耳謗多固可畏才盡亦知恥胡然此相見馬逸不能止蓮洋詩格如蓮花引我亭亭出泥滓請君髙詠結交行和我狂歌從此始天章詩名蓮洋集贈門人張逸峯坦因呈其尊人魯庵霖且以為别四首擕手望秋旻此行欣識君誰知滄海月近接泰山雲雅意黄花澹浮蹤白雁分空慚向衰暮何以答殷勤憶與尊君友重逢念載遙甘輸才不世豈謂謗同招對酒海空濶吟詩秋寂寥眼中賢子在愧我益無聊魯庵亦罷官家居書舍静偏宜邀歡爾許時忘形信杯斚善謔入風詩退筆欺傖父新妝玩雪兒殘秋足風雨别路不堪思努力家門重清時事業優潛鱗且寒水健翮有髙秋青紫君如拾方蓬我可求相期各珍重鶴背與螭頭暮春泰山道中遇雨餘寒和曉色客路轉氤氲五汶入春雨千山行岱雲塵消容馬健緑淨向天分未擬成歸夢今宵遮莫聞晩晴過泰山下時將之江南烟披嶽麓翠帷張雨浥春疇細草香人帯㫁霞過小渡鳥衝飛絮入斜陽鞭絲帽影垂垂逺日觀天門望望長嶺半桃花隴頭麥肯餘物色與江鄉自濟寧至清江浦舟中雜詩六絶句上閘下閘春水平大船小船銜尾行檣間神鴉忽雙落堤畔官蛙時一鳴歴歴千艘北上天南音入耳總堪憐微風忽逼吳儂語却憶昌亭夜喚船湖上殘秋隔嵗情雪蘆霜樹映妝成漁歌喚起扁舟夢獨倚篷窗看晩晴栁帯濃烟千頃新年年空䕶錦帆春祇今飛絮憑誰管惟有隨波上下人虚傳銀漢接黄流迢逓天孫不可求雲錦織裳成幾許文星無數傍牽牛桃花浪落失殘春鷁首風髙阻去津三老慣知河伯意金錢偏與賽夫人酬張孝亷日容大受招同朱竹垞及吳中諸名士讌集河上新齋見贈二首詞塲髙步已無縁賸向江東作酒仙未免能為洛生詠何因直上孝亷船禾中一老晨星在吳會諸君竹箭偏除却雄談似焦遂道余底事足流傳見贈有十年秋谷流傳體之句虎頭癡黠體難調客況猶憐未寂寥竹徑主人從見閉桃源居者徧相邀憑將文酒塵如滌何必湖山夏可銷魂夢勾留知有處緑楊風外赤闌橋暮登金山宿海嶽樓二首江晩潮半落鳴橈乘好風欲尋浮玉上遙過碧虚中塔入山烟澹欄欹夕照紅前期欣有託海嶽一樓空秋色連江暝憑髙望欲迷汀烟向山疊漁火引星低天闕捫疑逼龍宫迥得棲今宵孤客夢清絶海雲西清江浦雪中飲同年楊芝田大鶴寓齋十年相見大河干倍憶春明離别難形影似憐新解組鬢毛應笑舊彈冠舟衝霰雪歸猶逺門對流澌住未安老向天涯且同醉休論塵海足波瀾臘日臘日暖於春深杯引醉頻始疑寒雪意似惜敝裘人官閣梅千㸃他鄉月兩巡簡書倥偬會間殺未歸身賦得病中送客難為别夢裹還家不當歸句各一首送人還青州無病别猶難支離望去鞍贈鞭數歸路留語勸加餐好月遙同思殘冬劇耐寒家書憑仗寄强為道平安不道身長客逢宵一度歸風塵從冉冉兒女故依依白晝躭眠過青春結伴違文書疏夢徧到日騐依稀夷門入闗婁敬奉前旌姓氏誰聞魯兩生十日春風千丈土夷門獨去弔侯嬴青龍岡北渡河口占杏花風颭榜人歌一瞬輕舠濟大河解道險巇有安穏祇應銀漢日顛波定陶道中即目鈿車飛鞚亂黄塵栁拂衫襦鳥傍巾看盡春風眉髻様始憐曽有戚夫人春郊即事天津偶與春郊約還將酒伴行雲烟際滄海花栁過清明曲度野風裊杯銜溪月生醉歸天上路十里暮潮平攬鏡見白髭一莖自題餘春猶自愛朝暉鏡裏新霜㸃頷微莫倚雄豪誇似㦸空憐少壯去如飛鉛膏坐覺輸青鬢刀鑷歸應媚緑衣夙習吟拈今㫁絶從知四十二年非篆水樓夜飲遊目偏宜傍海天髙樓夜上更悠然流波遙作方圓折明月全收上下弦客似閒雲信來往杯將清漏共留連主人肯借匡牀卧坐遣蓬壺到枕邊問津園即事閒園有約幾回空逸興無端趁海風緑樹自隨人逺近斜陽不隔水西東槐陰老屋宜清簟蓮葉新陂待碧筒便與諸君常倒載兒童一任笑山公五月晦夕魯庵邀登篆水樓納涼余以病目辭明日為長句奉戲且自嘲昨暮君在篆水樓樓中涼冷如始秋我聞未往神已往長鬚更遣來相求小庭屣履忽却坐心與喉語空吚嚘與披海風對明燭寧俟夜露清昬眸連宵轟飲錯賓主如入酒池争拍浮歛眉愁病悲紅袖侈口狂怪驚白頭皆比日座中事阿戎阿咸劇不耐戰鼓正急戈先投子弟輩往往先醉英雄惟有使君操長鯨渴吻交颼颼丈夫漸老身如寄失計未是埋糟邱但憂遇疾無小大十指亦足妨觥籌何況神明在阿堵詎令巖電精光収賓筵佐史職不稱妖姬遺事酬靡由縱使當杯强成醉羣仙應共嗤盲修極知良時足可惜請君此夕無朋儔青天髙懸列星在招呼一一堪勸酬不然言歸洞房迴紅醥翠袖聊綢繆文昌服藥我自忍玉川訟月君其休昨望日月食弦開輪滿須臾耳所冀一雨生清幽登樓風景應更好便擬長夜窮歌謳酒空客散初日上與君縱目滄津流聞魯庵自河北移竹種於垂虹榭後奉題十八韻愛君池上榭六月如寒㕔連朝坐新雨倒盡雙玉瓶小山當戸矗孤雲靄亭亭微風香池荷跳魚響清泠四圍雜樹色參差翠成屏猶嫌未濃陰不蔽白日形衛水二千里水濱竹青青深叢積霧雨新籜抽雷霆一舸衣帯流千竿鳳凰翎遂使尋丈姿入此方寸庭君真好事者迴斡動地靈劚象起嶔岑排空生杳㝠淒清髙士廬縹緲仙人扃正賴琅玕景一洗魚肉腥潦倒王子猷長日煩居停追涼應更數嘯咏或可聴娟娟海天月照人易飄零與君即􅄞阮但醉不用醒風人詩二首莫茹沙頭蓼難堪一㸃辛不知蓮薏苦爭道解蓮人繅得新絲絮牽縈幾許長春畦聞藥氣試與覔蘹香題家弟稼民執榖所畫花草便面十年山居侣草木籬外荷花水邊菊閒摉薉莽品清新細草幽花總堪掬出山忽作塵中遊袖手昏昏滄海頭輪與惠連能染筆臨泉坐石冩清秋誰送一枝來眼底露態烟姿夢魂裏憑君傳語報池亭開到秋花我歸矣冬日去天津魯庵及其子弟相送至逺郊留别二首寒郊曉風日慘澹引行塵經歳忘歸客今朝獨去身可憐相送者一一最相親試與斯須立已傷無限神臨岐黯無語忍泪望風埃久住渾非客忽行如未來林疎殘日逺溪午薄冰開宛是相迎處春寒首重迴因園集卷六
