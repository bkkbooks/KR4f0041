body:
  text: 因園集巻四左贊善趙執信撰觀海集東嚮言懷秋草綴白露凄迷曉色寒怪余竟何事結束辭家山東去入溟渤天水相漫漫豈有古仙人引手許延縁男兒負竒志夙欲吞巨川轉側在世網焉能死草間長風倘可駕一上蓬萊顛安期何用見但取開心顔臨淄詠古六首淳于墓昻藏贅壻走王門斗石區區聊與論一醉欲傾天下士何人送客獨留髠淄水寒沙小渡逺逶迤淄水東流無盡期莫怪田巴清自鏡要將面目示齊兒三士墓石父曽令脫網羅留將三士竟如何孟嘗坐食三千客拚盡園桃殺幾多愚公谷牛馬何心一任呼觀臣狀貌故應愚寄言谷口諸年少好為伊人縶白駒棄繻生墓却被闗門識此生尺繻談笑換長纓祇憐賈誼空流涕贏得長沙鵩賦成梧臺城南萬木入天風雨送秋聲過故宫總是於今蕭瑟地當年那更樹梧桐望温泉日照牛山石上泉琉璃浮動出寒烟驚心沙路晶明外潑眼風林搖落前沆瀣試嘗應不减清泠可枕豈虚傳揚鞭却與飛流語比到東溟孰後先乘車渡巨洋水乘車如乘船却顧失船尾倦馬一聲嘶雙輪碾寒水帷裳動郭索容葢入𣺌瀰僕夫揮長鞭豈有楫可理中流縱邅迴彌望出涯涘絶勝繋瓠樽拍浮不自止濠魚樂獨知海鼈笑無已借使求三山安能泛萬里月海月自東出照人如有心猶懸九秋影頓失昨宵陰疊嶂依雲逺空烟向水深無因乞靈藥桂樹漫森森昌樂道中轣轆輕車不動埃營陵舊社曉徘徊青林白露微茫下丹水名岸黄花瑣碎開城日初懸遙海色野風偏向晩秋哀行人莫訝宵衣急要踏鷹揚賜履來昌樂過閻諭徳前輩話舊菊籬茅屋正蕭然往事隨君到眼前荷鍤真堪喚牛走拂衣同是值蛇年青門夜月三更夢丹水秋風十畝田莫倚清樽説生計神洲東去海浮天雨霽早行寒雨淨天色曉風收暗塵亂霞明綺皺初日上金輪草草鳴雞市悤悤渡水人凉秋縱東走海氣正鮮新濰水詠古昌邑名芙蓉城芙蓉城外秋蕭灑古渡寒波𣺌東下舟人猶説淮陰功墟里空存柏欄社昨過瀰水即巨洋按圖經大耿差堪淩鄧賈如何人傑冠蕭張不得雲臺姓名寫列侯未保及身榮劉氏齊王許誰假白水真人赤帝孫當代應羞漢恩寡擬將濰水上游沙燒作未央前殿瓦垂至萊州興盡却返海天遺興竟如何返轡真成此浪過萬里沙頭風色迥三神山上夕陽多餐霞食棗元無分彈鋏思魚漫作歌歸去清真堪自守不將身事問滄波再宿膠水客舍去海三十里北望空㝠㝠斥田秋草白古竈鹽烟青信宿非懷土寒霜又滿庭夜潮如有意遣我醉中聴寒亭雨夜對酒遙寄諸弟寒亭兩度逢寒雨孤館秋燈照酒巵海外方蓬遲後約山中萸菊誤前期仙人攀樹徒欺我羣季開樽更憶誰為報西風莫吹㫁預教歸夢過清淄歸途即目霜樹荒村又午雞去來應自笑栖栖秋風吹水偏流北自巨洋以東水多流北海日催人却向西逺目欲迷山影轉雙輪曽壓岸花低相逢若問何聞見袖裏詩篇只自擕戯題冰雪寒多空自抱青㝠路絶與誰攀早知卿輩真難記何意相逢飯顆山却寄途中諸水幾臨秋水滌風埃不學東流去不迴海若形容渾未識寄言衆壑莫相猜與馮信州躬暨夜話感舊空村萬木號寒雨坐來歇秋燈照病顔各已生華髪庭軒颯以清壺樽偶然設豈知故鄉親有似天涯客十年異出處相望若秦越心依玉山雲夢㫁金門月欣逢水聚萍惜别風振葉人生離合情且與盡今夕鵲驚三匝飛鵬去六月息何處與子期神洲有銀闕馮文毅公别業古柏公今游戲仙人鄉手折苦木攀扶桑却揮龍騎返故里碧鬛蒼鱗欲飛起化為老樹當庭蹲排突雲窟盤山根要將直幹留天地豈為清陰覆子孫我來俯仰三歎息何必新甫之顛錦官側吁嗟乎門前幾日不霜風君看萬栁何顔色題信州所畜白鸚鵡自愛晴窗理雪衣霜風還為下簾帷情知舌巧王孫喜不向金丸落處飛題摉山圖深山窮壑妖所都帝遣丁甲行天誅飛亷屛翳豐隆俱鬼獰神怒爭前驅戈矛霜耀森旌旟彼主者誰提鹿盧金甲錯落鬚眉粗前伏帖息為於莵何不乘之趨亦趨却跨兩鬼麾前徒雜還萬衆飄風徂蟻視蛇虺鼠熊貙剸胷碎首不須臾立使幽險成夷塗窈窕巖洞中紆徐猿猱狐狸相與娱炫服麗質人無殊新妝盈盈施粉朱狙公醉倒笑語扶峩冠墮地猶狂呼大罰降矣何其愚死且不悔可歎吁巨蟒脩鱗千丈軀舉頭倐忽排雲衢掉尾已㫁將焉逋黑螭拳縮甘就拘潛飛無計空牙鬚俛視水澨羞蝦魚禹鼎象物良非誣烈山焚林勞朕虞未抵神力工掃除閶闔巍巍臨太虚清問下逮知民瘉山川永奠人安居麒麟鳳凰豈竟無問君胡然為此圖途中雜感二首龍腹龍頭誰是非名髙容易與心違千秋皂帽比肩者只有仙人丁令威上天入海事虚無縱飲東方計未迂借問金門名業在都將分付牧豬奴野行訪王文學不遇秋田泥活活野路半分明露下麥初茁烟中人自耕溪沙夜牛跡村舍午雞聲惆悵林扉寂幽人不出迎不得遊九仙琅邪諸勝留别王汝敬汝謹兄弟結願苦不遂吾生難自任故人滿目前相對惟悲吟天寒日月逼海近雲霧深馳馬忽歸去清淮漸我襟濰亦名淮雲中九仙人揮手笑不禁豈意鄣日山障此一寸心秋風浩相送却顧烟在林馬耳幸無恙盧敖期重尋過鄭公鄉感懷康成去已久秔稻荒書堂書帯在何許不如秋草長此間頗豐饒萬疋傳魚梁人言管公都當羨鄭公鄉二公相視笑吾意故難量君看鴻鵠舉雲海恣翺翔旅宿見王子言侍郎壁間題句愴然感懷成二絶句於今海嶠秋風候還似天門暮雨時忽憶當筵索狂飲何如敗壁讀遺詩廣陵絃絶竹林愁阮籍迴車哭未休千載窮途數行淚無人解道為同遊平度州道中望東北諸山秋風吹倦客縹緲凌紫霞赤松仙人要我去為駕白鹿青龍車羽輪飄飛不自制始計已失秦琅邪大勞小勞逺相待回馭又復成參差明霞碧落杳夢寐玉女有爪羞搔爬北行度膠水惟見塵與沙晴嵐百里豁心目髙望一㸃青於鴉衆山肩隨出戢戢木末爭槎枒天柱孤標依蕭爽下笑兩髻魯始髽東萊岱華列首室不敢加譬人名既成無事相矜誇大澤東來獨雄傑森然列仗排髙牙雲峯飛瀑落千尺烟光蜃氣無由遮臺殿嵯峩市空曲浮金炫碧生谽谺我今矯首意惝恍況於抗策窮幽遐人生能幾何引領白日斜海山有約易錯􅘅此中便可終來家藥石水大澤亘萬壑雪瀑生金泉飛流不東注逶迤林薄間海中有靈藥帝力不可干神人故相靳地氣鬱欲宣葳㽔被幽谷馥郁滋長川微風引香逺皎日臨波寒公沙飲白鶴此事昔所傳突兀青山臺秀色明霜天我欲褰裳去服餌遂忘還且復進一掬塵襟倘可捐金泉山名白鶴泉名萊州詠古天光盡處指神洲碧海丹霞萬里秋千古雄心百年恨三山亭北是沙丘三山亭漢武所築海岸有沙丘城俗亦指為始皇崩處山行求道士谷及長生披雲諸洞處在萊州東曉日出海如新沐光射東方山更簇白沙已没祖龍城青嶂猶藏道士谷我來含笑淩㠝岏惟見翠樾蒼松寒山烟十里浮空碧知是披雲人煉丹將赴萊陽道中作姑尤二水亦名大沽小沽松雲沙水際微徑引﨑嶇天入東南海山圍大小沽人煙連島嶼風日近茱萸錯莫王猷興窮秋信所圖萊陽雨夜對酒贈同年張伯績兄弟髙城吹角引嚴霜良夜開樽共燭光傍海魚龍多出没方秋雷雨更蒼凉年華荏苒看籬菊身事蕭條寄醉鄉家在蓬山雲卧穏故人且莫歎滄桑偶題服食何心覓大還勞勞但取換閒閒要知伐木牽蘿處不向芝山向藿山二山俱在萊陽重九亭子山登髙仙人結亭就松樹至今松色離離青松間時復有人至惟見石壁銜清泠霜催客鬢不辭醉日落秋聲誰可聴仙人此際俯視笑海山亭閣雲長扄遊伯績東園不知門徑處黄葉自成堆是爾種瓜地為余擕酒來秋風生水曲霜月轉城隈已遂十年約重傾九日杯别萊陽十日醉眠穏都忘東走迷離心忽𣺌𣺌客路又栖栖霜樹明見野城烟寒過溪羸驂如有戀却望郭門嘶暮抵棲霞秋色組青黄幽叢亂松菌晩日照逾妍空烟寒向盡山深路屈盤霜老風凄𦂳草際清淺流紆迴似相引峯開睥睨明水濶樓臺近誤疑到汪洋已見驅蛟蜃入郭如有獲披圖始自哂託宿碧霞端仙期夢應準絶句萬里海風吹片雪紫皇一笑電光開霜寒歳晩梧桐老飢鳳啾啾何處來李詩孤飛一片雪隔清洋水見山寺寺門霜葉甚盛斜日秋山一掩明寺門迢逓落鐘聲半篙白水千紅樹疑到櫻桃澗底行福山有櫻桃澗福山縣就同年陳踽庵宿語次及長安故人入門一長揖相見海山間把酒對明燭何如疇昔顔寧辭我獨醉聊與子同閒已結紫霞侣空懷青瑣班對酒寄任登州具茨時淹歴下蓬萊主人深避客何事三秋歸未得故人却趁西風來拏舟徑到三山迴羣仙招我入雲去自愛掉頭不肯住拚將身計託糟邱忍使情交隔烟霧霧重霜深醉起遲惟憑海日寄相思遙憐束帯趨公府正是神山日上時被酒贈踽庵踽庵天性不飲而家蓄㫖酒甚富詩才亦超陳生意氣何卓犖每謂古人今可作餘力間出為新詩清響夐然動寥廓壯懷方擬淩雲烟剛胆翻令怯杯酌應縁造物忌豪雄恐爾狂酣搖五嶽我從放後拙言詞不遣悲吟赴謠諑酒兵積漸亦已疲猶令偏師且前却昨擕短策逐鴻䝉西風吹背霜侵脚始過東武後昌陽隨處虚船自漂泊舊知不棄邀我食一一盤筵致珍錯徑將海國比屠門總使甘鮮換藜藿飢腸雖充如有亡意外新醅失前約濁賢接跡來無時强飲終羞鸕鷀杓朅來訪子之罘陽但欲髙歌激海若清樽入手忽信眉一洗胷中九秋惡怪君不飲有厚藏正似束書置髙閣投轄便為十日歡留賓立盡千金槖寒山蕭條雲壓城缺月微茫夜傳柝聴君吟誦鶴唳天看我沉酣魚縱壑人生適意貴當前夢擾魂驚真齪齪常持美酒對故人多事祖洲求大藥秋盡日感懷鄉俗以十月朔上冢今年正當立冬西望寒山千里秋飄颻身落海東頭壯心豈為金丹誤往歳空將玉舄留不覺衣裳侵霰雪遙憐車馬擁松楸清霜事畢黄花了明日新成一種愁久滯福山贈邑中諸君子山城倚滄津著眼若黑子由來藴仙靈乃有佳人士二鹿各好文一郭猶秉禮龎眉陳文學言必舉前史我友瑰奇姿朗抱脫泥滓雖異鄴中才頗與竹林似見我皆歡顔迎我皆倒屣邀留散煩懣日夕醉多㫖我如失林鶴飄飛不自止何意洪厓儔披雲笑相視尚想崑崙顛一候蓬萊市移家定未能且住為佳耳始見海洗眼看雲海前期未參差心目忽一豁神情恍四馳大地直前赴髙天歘下垂顛波從東來神山競西移斜日萬里碧寒風十月吹半生在埳井跬步臨津涯蠡測亦云妄桴泛將安歸𤣥虚倘可作詞賦猶能追望之罘二絶句誰臨青鏡裊烟鬟夕照遙分海面山傳語蛟龍守宫闕暫令仙侣住人間屈指秦皇勒石年雄文二十字流傳當時總遣山為碣誰向滄溟䕶一拳題海岸小溪沙岸坼逺海微涓先見容為憐江漢水萬里始朝宗雪晴過海上適海市見之罘下自停午至晡快暏有述時十月十日今晨雪乍晴寒日生扶桑出門邀河伯東嚮同望洋昨日之罘山紫翠㸃水如鴛鴦未至二三里見人欲飛翔坐來忽復不相識迴峯疊障皆摧藏赫然烟靄中城郭連帆檣疑是秦樓船歸來閲千霜又疑瑤宫與貝闕神山倒影滄流長飛仙驂虎豹晃漾淩波光招招不得語目極天蒼黄同遊競指是海市對之使我神揚揚歳序閉冰雪魚龍走顛僵非時出瑰麗此遇超尋常當年蘇夫子雄詞自炫驚海王慙予本凡才未敢縱筆相頡頏不請亦得睹失喜欲發狂巨川細流兩無拒信知大海真難量準擬還家詫鄉黨詎肯此地辭杯觴天窮人阨總莫問微塵大地俱荒唐客散境變滅半山還夕陽醉歸却聴暮潮上浩浩天風吹面凉月夜飲酒燒蠣房贈陳康海月滿古鏡耀潮至羣龍吟主人有玉壺屢為酒仙斟仍呼丹砂童吹火竹爐深一煉碧山骨遂陳綺席琛杯吞渤澥波食割蓬瀛岑不惜盡寒夜因君豁煩襟泛海言懷忽登萬斛舟如躡長鯨背寄身入無涯曠覽乾坤態潮動風色遒棹急雲光碎潛隨元氣遊迥出人境外千山相簸蕩六合欲横潰頓覺䘮吾我何知齊小大幼安漂泊久謝傅襟情在誰發小海謳迴颿引雄槩即事大雪三日十日陰窮冬坐學秋蟲吟兹遊汗漫不自解對客猖披非我心山翁折屐村徑滑稚子送酒寒更深不如却訪成連去萬里雲濤無路尋晴日村南朝曦上窗户許我出村行海暎半天雪松吹十里晴溪流有歸處鳥雀盡寒聲不覺山中客遙牽歳暮情再寄任登州歴下亭邊秋色改明湖寒水東流海飛雪滿天不見君迴賓為主遙相待海上沉沉絶素書經時烹盡錦鱗魚請君歸掃蓬萊頂我欲丹霄騎白驢遣懷東來作計近全非半欲棲遲半欲歸病喜賓朋同雪夜寒知僮僕尚秋衣沙鷗日久隨人狎塞雁天長背海飛久不得家書何計差堪解愁思清樽瀲灎蛤蜊肥大雪日簡踽庵飛光誤我守東隅坐閲杯中節候殊蝶化寒宵渾自覺萍依絶岸未為孤辭家見月三圓缺對雪看山半有無宿醉欲醒千日過人間何意尚迷途赴登州留别康海微雨牽行色離觴且對君預愁見何日不惜手輕分逺海髙於岸空烟聚作雲來朝倚仙閣吟望背斜曛海潮庵萬里青蓮色虚空擁化城人隨海鳥至僧帯磬聲迎梵唄潮相應樓臺蜃不爭登臨悟無住渾欲厭浮生蓬萊閣望諸島歌君不見不周崩摧地維裂東南海濺共工血千山萬山皆平沉鼇撑無力海水深女媧揀石煉天色餘塊纍纍向空擲落處蓬萊淺且清看當霜雪寒逾碧長山西接沙門長鼉磯北去淩蒼蒼牽牛滅没見尻臂大竹小竹爭頡頏或如星槎墮河漢或如古鼎騰光芒魚黿戢戢盡昂首雲霞歴歴森成行餘者瑣細不足數鷗浮鷺立參微茫雄觀何年付髙閣丹邱縣圃簷間落雲卧分明見鳳麟天飛真擬驂鸞鶴驚風颯颯碣石來銀濤連山中劃開漂搖島嶼相摩戛激盪海底生轟雷登髙望逺心易哀黄昏白日須臾催半城烟火下山路身是仙人被放迴坡仙詞五日登州守千秋海市詩蛟龍留勝跡雨雪滿荒祠才覺乾坤盡名將日月垂丹青餘想像漂泊識鬚眉島翠堆虚牖簷絲罥㫁碑仙靈幾延佇山鬼强攀追黯淡蒼苔氣凋殘碧樹枝夀陵歸國步鄰舍捧心姿徧選丹厓字誰為黄絹詞寒山公獨在坐卧我於斯酒酹滄波逺吟躭夕照遲方平有雲駕肯負執鞭期田横寨詠古骨換黄金赤驥趨何煩絶海覔龍芻但令和氏能知玉謾道齊門總濫竽舍客三千兩雞狗島人五百一頭顱憑誰寄問重瞳子死到虞兮更有無大風登海鏡亭觀潮疾風鼓窮冬大海勢一變頓收浩溔形坐獲竒麗觀聳身列缺旁側足虬龍畔譬如倚閶闔下見元黄戰波騰銀屋翻沫吼白雨亂萬靈助呼吸百怪忽隠見東連湯谷沸北汨雪山轉恍忽掣丹厓蒼茫吞赤縣天吳本肆威飛亷苦相煽莫測天地機但覺心目眩倍看城市親遙被舟楫羨一笑險夷間吾生失憂患海潮庵觀出月晩潮碧黤黮寒月金玲瓏誰持琉璃盤捧出蛟龍宫方圓隨想像根蒂生空濛黏雲欲飛動蘸水聊從容長風蕩千山夜色明萬重幸依繫象前得闚顧兎蹤披懷倒冰壺揚袂拂桂叢七寳待修合相期跨星虹食海族有名海腸者戲為口號越國佳人空有舌秋風公子尚無腸假令海作便便腹尺寸腰圍未易量却望登州碧水遶丹山重城雲雪間迴看身卧處真作海中關誤被神風引遙尋陸地還故谿堪枕潄仙路莫輕攀早發沙河店是前年却迴處過此望海惟見霧氣沙和積雪壓村低客路曽經到此迷三載迴環貪碧海平明行李信黄雞東來日射山形㫁北下天横霧陣齊破浪雄心渾未愜乘風更問大荒西因園集巻四
