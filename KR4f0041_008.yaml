body:
  text: 因園集巻八左贊善趙執信撰紅葉山樓集夏日移居山莊四首長日生清興幽棲向逺山去人惟恐近無事更圖閒白石知心素黄鸝約徃還悠然顧城市便覺不相闗香緑襲衣裾逍遥恣所如田家麥秋至村落棗花初舊蠟登山屐新鈔種樹書北窗容倦卧無暇賦閒居南風吹好雨與我忽同來野色一時活嵐光四面開林花争浥露園笋乍抽雷誰訪清凉國平分頓遜杯欹枕雨聲清髙樓馬耳平嶽雲飛斷續溪漲上分明厦庇心難遂田疇計已成沉吟身世事惟有學躬耕即事繞屋千章樹連村二頃田溪聲翻麥浪山雨浄林烟地僻聊充隠樓居不學仙祗應似彭澤種秫徧門前村舎亂峯重疊水横斜村舎依稀在若耶垂老漸能分菽麥全家合得住烟霞催風笋作低頭竹傾日葵開衛足花雨玩山姿晴對月莫辭閒澹送生涯積雨寄稼民弟方同在此莊同爲岳陽人屋宇相参差如何十日雨迢逓成天涯登樓見場圃麥積髙離離盈村泥活活芒屩無所施山雲蓊然起羣峯不相知門前流浪平聲水倐去如風馳晨朝攬鏡歎濁酒思共持努力保百年永與稼穯期携酒溪頭酒盡雨至携酒溪上飲酒波相暎清林風東南來颯然吹我缾山雲亦大上迷漫如炊蒸雨脚森森明青天引萬䋲主客相視笑興盡可以行徑滑沙自軟衣霑體更輕迴望莽蒼間人牛紛縱横始憐力耕者未是心無營新晴好雨無妨乆新晴更自佳兒教送藤杖僕爲晒㯶鞵山翠濃霑袂溪風亂入懐閒身乗興出偏與夕陽偕望夜雨雨師長傍岳陽行夜半懸簷有瀑聲清夣驚迴牀漏徹水晶宫闕月朧明舎弟三人各自其莊至城中聚族居兄弟良足歡深林有曲枝積水多濤瀾朅來掩山扉孤鴻下長川豈不躭閒寂對食恒憮然今者二三子並至誰招延皆言小麥熟從事塲圃間山中一月雨髙壟生流泉持䥥空躑躅沽酒聊纒綿暮霞何澹泊西南起炊烟出門指邨墟阡陌相接連幸䝉先人力各保百畆田春秋恣徃來晨夕欣盤桓錐刀誠可鄙文史寕盡捐苟能勤耕穫亦未虚歲年無以子衿詩而易蟋蟀篇送稼民返舍獨向斜陽縱轡遲新晴風日促歸期登樓西望千重黛此是今生近别離霽日曉霽霧欲収青山自吞吐朱曦盪積隂朗然當我户俯視見䟽豁聚落粲可數淄水抱日來浮光動禾黍農夫擊柝集鄰舍繅絲語飽食出溪橋㣲風坐停午酷暑醉卧夜分疾暴作㡬危頓比曉愈戯示小妻人生生死如晦明嗟我未識猶營營人生疾病當炎暑如鳥遭籠魚在煑狂夫嗜酒三十年此身那比陶器堅聖人忽然爲豎子窮山深夜來相煎雷公沉湎羲和睡獨使驚魂逃宿醉平明童稚笑相㸔一昔中山恍隔世從今不薄劉伯倫老去低頭聴婦人七弟徳璉邀至郭莊朝徃暮返亂淄水行是日㣲隂時復細雨依山欲十里經流凡㡬渡輕隂貺凉颸宿漲開沙路曖曖烟際村濛濛水邉樹遂至惠連居頗諧濳夫趣虚楹積暑避老屋遥山䕶蔬果不外市雞黍亦立具童時憶曾過丱髪今已素留連感平生長日易爲暮伏雨止復集小駟嘶且顧幽興属清淄朝昏暎來去與吳客食佳李團香融蠟玉盤堆乞與吳兒一百枚飽啖知卿減鄉思那餘風味到楊梅七月一日登前山卧石上與道士語乆之日日對孤岑㣲風落磬音扶笻秋乍曉覓路樹逾深青壁潄塵夣黄冠通野心稔知霜葉好留傍夕陽吟曉起即目睡足愛秋曉迎凉獨啓闗初陽㣲冩水餘霧㪚棲山樹與禾麻競人將雞犬閒遥憐五侯宅春夣未闌珊再飲溪上浮烟羃村榆桞晩返照侵溪沙水淺塍間鳥雀驚忽飛林際壺樽紛又滿酒人正與夕凉期坐客還云席地善石梁經日尚温暾莎草承秋校深輭行觴碧波争迅急對踞蒼山交偃蹇稚子環㸔入畫圗老農錯語通寒煖是日晴天無片雲新月如弓挂遥巘殘鐘出寺一帯風髙屐過橋數聲犬蓬心已逐大火流塵袂更教清露澣他年應笑竹林人黄罏自近公自逺答十一弟緩庵見懐因寄諸弟四首問訊山中况能來領畧不屋廬從草草水木故修修禾稼十分雨峯巒三日秋憑君試遥度此境尚堪留案酒溪魚小充蔬野菌香行依林作幛醉愛月臨牀秋淺冝新健山深縱老狂閒尋髙士傳若箇足相方自有琹樽樂還將婦孺俱敲針任螭虎説稼與清娛多事傭舂隠何心擊缶呼朝來感懐抱巖畔見茱萸荷汝殷勤意連朝嬾報書恥争雞鶩食坐使脊令踈好月相延竚荒庭與掃除應携逺山色歸去慰離居七夕偶題二絶句機絲嬌嬾不成章牽惹黄姑伴恨長格是住期聴去聲烏鵲隔河無事莫相望飛車交碾海生塵竒巧由來屬世人傳與天孫湏下乞銀河一葦即通津秋光觧道淵明日夕佳秋光次第列山家薄寒㶑㶑浮雲葉細雨濛濛飬豆花螺髻千峯争渲黛蝉聲萬樹半拖霞橘中不羡商山樂况乃飄摇上海槎絶句中元暫返里第住山情未厭奈此城中節山月苦隨人天明不成别飬病山莊自贈息機逃世網所樂在幽僻自纒疾痛來體性彌不易門户矧多虞氛垢日以積託兹屋數椽拘維暫如釋分庭得翠巘習我相主客春風去不盡紅藥猶狼藉掩闗䇿枯藤獨踐昨行迹髙鳥未倦飛斜陽曖將夕偶題坐起如孤客誰知意緒佳髙閒三嵗病富貴一庭花緑麥朝經雨青山晩上霞餘生能保此何事覓丹砂悼脩竹碧嶂清泉總可悲萬竿脩竹異平時主人猶自矜風調不惜荆花惜柳枝㣲雨山行小麥花開秫始萌村墟處處黄鳥聲肩輿曉出犯霧雨住山一徃多山情岳陽南下紛澗壑羊腸數折分馬陘我從世中來措足轉覺坦易無欹傾連峯倐閃溪沙白濕雲㪚入炊烟青飛鳥忽縱見平曠東西石馬相逢迎壠頭草盛耰鉏聚林端人過雞犬驚何當桃花未零落仙源作記煩淵明石馬村東西各一田莊贈十一弟結屋偎青壁當門界白沙山雲千畆亂溪月一條斜飯美蔬厭雨樓香棗送花比年康樂思對爾欲無涯渉淄水感懐鼓瑟吹竿豈自由少年鹵莽長年羞而今不作齊門客才泝清淄最上流循淄東下偕十一弟及欒傁淄水多伏流浮沙𣺌雲雪兩山夾歩幛錦綺参差列縁山出村落頗有佳田疇山風吹壠麥湧作淄水流衰翁跨蹇驢兀如乗舴艋快意緑隂中矍鑠思一逞自我廢行歩遊渉恒因人因思舟船適共説楊子津今年定有年我疾亦應校及爾裹贏糧秋風期鼓棹重過邀兎厓不至㡬四十年矣竹馬心情老病侵嬉遊舊迹與誰尋攬衣無限存亡淚屋角低迷夏木深郭莊夜坐示七弟時十九弟自麻莊來與十一弟先醉卧空村轉山隂落日荆扉啓壺樽儼然陳知汝乆相俟兼旬隔歡笑盡日困邐迆觧帯就中庭新月色如水小弟何處來移家傍畏壘阿奴幸不至火攻吾免矣夜分各醉㪚偶語未能已家門盛衰由老大哀樂指南山白楊風石闕自磈硊榮名良足寳勿遺後人恥喜孫淳夫王通逺見過林下移茵避午晴溪頭䟦馬辨人聲觧襟相對有野意濁酒一壺還細傾日影留連縁北至麥黄深淺入西成草烟犢路頻來徃便可山田事耦耕月下塲中聴歌晩霽塲圃静空村雲月閒此時歌白雪偏稱對青山十載違髙調中宵觧病顔淄流入新雨清響冩潺湲寄訊稼民弟登馬鞍山十里馬鞍山依依户牖間峯巒列城堞梯磴造天闗雲月忽明晦仙靈應徃還望賖疑夣寐病起待躋攀羡爾身手健當兹耕稼閒杖藜入蒼翠行飯上孱顔名嶽分尻臂清淄轉玦環㸔余髙卧處黒子著塵寰暫歸省侍夏雲欝重隂長晝趋庭闈清凉雖適體寧不懐炎威入門奉杯酒歡顔幸無違槃㪚郤伯歩爛漫萊子衣疾病歲月永放佚禮樂㣲嗃嗃竊自保憧憧何所希宿因園獨卧境倍寂心情恒有聞終夜風雨聲水與竹平分經時棲窮山自謂逺垢氛却返鳯麟洲顧笑麋鹿羣夜雨曉㣲山行漫咏霧外雞争咽村邉客暗過溪流夜痕亂山雨曉凉多幽徑披禾菽生衣潤薜蘿空慙荷鋤侣猶未具烟蓑觀漲二十韻積隂歸山南風日啓清麗午景浮前川奄忽水大至初聞聲震蕩澗壑助逺吹漸見勢瀰漫坡壠各易位前奔如有程横潰遂無際擺簸困喬林崩騰坼厚地荒涯牛馬迷吼沬兒童悸空村走若狂余亦曳杖出半生放浪遊動與潮濤㑹濁河千丈波八月夜掉臂朅來卧山陬每愛沙水細消長固有時變更或失計乞假淫潦資依倚岡巒勢造次快狹中蒼黄逞雄氣蛟龍羞蹙縮魚鼈縱凌厲小利欲何成暴興恐難恃大海在宇宙終古不涌沸一瞬汎濫流祗遺元㝠媿褰裳謹漫投濯足存深致髙咏秋水篇斜陽歛晴翠雜題三絶句積雨藥欄斜復斜日日日出㸔朝霞墻角已然覆盆子樹頭猶絓牽午花宿酲初觧飽藜羹捫腹荒園自在行擬喚鄰翁誇食指兩畦新長紫膨脝移牀恰就井欄平槐葉隂濃水氣清機事自勞心自逸夣迴不厭桔橰聲耿明府再枉山居奉留小飲伏雨霾來徑倍荒亂蝉聒處日猶長頻教仙令過愚谷始信閒人住醉鄉白水青山圍促席紫茄紅莧侑飛觴前騶莫便施銜轡門外秋晴澗草香七夕示内二絶句香濃燈暗立秋庭近月㣲茫欲辨星窺盡風情是烏鵲人間空自媚丹青宿醉狂顛近病慵明河篇詠媿舂容衰翁都未經營巧那得天中記到儂十四弟邀同王眉山之城子莊兩兒隨行道中戲呈眉山秋山前分逺相引秋水中曲行相遮山似主人乆傾待水如客意紛交加蹇驢亂流等鳧雁稚子疾走過麏知君體極念平陸黄塵深稳眠牛車王居新城地無寸山晩出城子莊感懐落日溪山劇可憐㪚霞歛黛入村烟村東老樹渾相識春雨騎驢四十年錢塘曹自蕙來視余山中將之歴下訪友門前西湖水枕上浙江潮作客二十年此間誰乆要我病不能行君病不能止驚蓬將落葉正値秋風起擬過大明湖愛其清且淪湖月照歸夢西子笑煞人聞有賣藥翁壺中隠天地拄杖㑹成龍贈君莫輕棄我本東海客願從安期遊當飛赤玉舄與子偕來不書病三十四韻積飲腰脚濕我行浸不良左杖杖乃立右杖人乃行立如枯朽株臨厓常恐傾行如弄郭郎俯仰何郎當所居是危樓去地尋丈強上下恒慄慄甚於陟髙岡因之出入稀竟日依匡牀傷鴻與病鶴垂翅常悲鳴引頸望青宵已矣將翺翔逸乆筋骨舒避俗心神清况爲婦所制什九損杯觴秋風來超忽溽暑濳退藏邇覺胈脛間蠕動如有營初試屢畏縮積日能支撑乍可歴梱閾漸已出户庭遂踈婢與僮不復揚粃糠惟有所持杖與我欲合并不謗毁推擠勝朋友弟兄雨後天氣佳獨歩越溝塍逶迤一二里至止淄水旁盤石故無恙隂隂櫸與檉恍忽增感歎坐起乆徬徨秋水瑩於鏡照影萬念平水東蕎麥花浮浮䝉雪霜我髪亦如之尚競何短長新卜杏葉嶺其兆獲允臧餘年自天假寵辱皆過望足力幸見還躄蹇固無傷跡落吳牛隊吟作樗雞聲村氓盡相安山鳥亦不驚南山千萬樹斜陽變㣲赬嵗豐人和樂病起心飛揚秫足不虞客稼畢冝多晴寄言舊遊侣能來我同登枕上聞雨口號農意欣厭客興狂雨聲半夜滿藜牀浸淫麥脚赴春日洗滌林梢承曉霜偶行淄岸見病渉者遂呼工伐槐樹爲橋於水上既成以詩落之村東淄水寒不流行人脱襪愁窮秋山深奄冉北風起霜刄如氷割人趾山居雖抱利濟心腰無犀帶思不禁老槐蕭蕭花落盡甘作津梁辭故林匠人交臂集溪上三日荒村斧斤響門前緑隂減數弓水面蒼龍横十丈嗟爾百年材始成安得扶持大厦傾從拚嵗月山林老且就支離鄉黨名晴蓑道人歌長空雲暗蛟龍泣短褐錦衣盡霑濕一蓑不蔽天下人自愛䙰褷僅稱身曦輪忽碾浮雲浄物態繽紛入明鏡豈知天意厭昏霾却遣人心艷華盛妍皮癡骨各自驕髙冠竒服争市朝機中狼藉千女指馬上摧殘百獸毛深山有客堅避世芙蓉爲裳蕙爲帶道人大笑何必然安能翻飛去人間短蓑一著無冬夏青天白日相周旋相周旋從來乆斜風細雨無日無激電轟雷有時有陸魯望張志和㪚人漁父共髙歌但願長晴不願雨霜月滿身篤速舞趨紅樹雨足山容重秋林不悦人㣲茫覓紅意黯澹度蕭晨舍弟飛書數鄰翁送酒新因風謝青女九日只踰旬送常熟馮代公元振南歸因懐其弟伯髙南風吹夣阻山城賸引歸心促客程别酒杯深迷返照驪歌聲緩雜流鶯年來漂泊憐兄弟老去心情戀友生若見江湖舊知已道余泛宅計將成寄聞喜同年張潮州四首令子亦堪乆在余家今以季夏西返積雨添愁思臨岐更不任病滋新别泪酒引舊離心徃日空裁賦髙山自入琴未甘同蟋蟀不俟早秋吟楚辭有惜徃日携手瘴江邉分㠶二十年鵬飛終逝北龍卧詎移淵書到落花後人歸霜月前近應減悲喜消息未茫然珠江别後今年始得君書太行邈天上君在太行西雨向汾隂暗峯將海日齊衰年稀夣寐壯嵗苦攀躋尚想東西塢二嶺名嶔崟入馬蹄故友都零落端居只憶君始憐疑落月絶勝咏停雲老有相扶藥窮無可送文殷勤寄懐抱但恐不堪聞題因園聴泉榭池光迴暎曲欄平澗水遥穿洞户行竟日深林響寒雨四時空谷送秋聲主賔談向鏗訇息魚鳥心從寂歴生憶訪仙人閲亭舘水精簾檻坐分明調馮生南歸不果夏垂盡矣聊以慰其客思爾馮生初騎齊地馬掦鞭欲馳且復下何如安隐乗扁舟夜半月明聞棹謳夣廻髙枕匡牀雨疑是虞山山上頭借問何縁未歸去本畏嚴寒不闗暑九江老翁言語誇相留計日成丹砂幻人方士跡如鬼使爾参差空憶家對牀有客同鄉縣絮語明鐙常逹旦霪霖穿屋雷破山長晝酣眠不聞見我有善䇿與君期夜惟飲酒朝吟詩酒爲客舍愁中物詩是君家世所司擁鼻寒蝉聲屢絶銜杯倦鳥飛仍歇人愁我病共蕭條奈此新晴好明月請君強笑開君心圖歸莫問囊中金西風無錢㑹相送一夜江河秋水深拯弱蟬髙棲飲清露自謂無所求忽縁山風堕適與池水謀池水深尺餘緑浄當深秋纎鱗不容躍薄翼不能浮初投木葉落漸轉車輪周冠緌困倒側狂噪聲如抽我時倚危欄憐爾爲爾羞失勢辭喬柯貪生負清流呼童拾竹枝立具梁與舟遂使伏機羊化爲釋縛囚亭南日正長據牖曝且休㣲眴似有覺徐鳴意相酬騃童乆旁睨引手鷹上鞲翻然棄人去寧爲恩私留本蓄糞壌心妄託鯤鵬遊勿狃今更生螳螂滿林幽因園集巻八
