body:
  text: 因園集卷三左贊善趙執信撰還山集園林即目叢竹才蘇三兩竿杏花如雪壓春寒雄蜂雌蝶披猖甚却放王猷冷處看清明鄉曲相將作寒食弟兄無恙共清明雨餘花栁逢人好春半溪山信意行上國塵埃聊復滌中宵魂夢不須驚持杯酹向山英道莫遣移文斥姓名園亭雜詩八首開門流泉側引徑修竹陰虛亭動逺色微風生古音更日得異賞寥寥朝市心久旱萬彚槁一雨四山活軒楹覺曉潤池沼漾新濶覽時會天遊惟我知魚樂鳴泉類相和游魚出有羣觴飛竹林雨坐接山烟曛何必侣嵇阮藹然弟與昆雨腳欲入戶山雲方挂簷落花爛如織行屐何辭霑無路溪西去夜來秋漲添晴日出山脊蕩漾髙城煙幽人倚林表目力窮蒼然不知晨風翼飄飛何當還衆芳委逝波幽事屬籬菊霜時挺峻潔歲晏傷孤獨昨行山巖際乃識無用木新月上歸雲纎纎動清影林深多得烟地寂易為冷豈必聞寺鐘我意默已領日日城東門一出還一入往來頗知煩動靜聊取適終愧山居人猶有城中跡觀鬬促織金商動傷殺惴耎氣一王俄然角翅完自喜牙鬚壯草間分蟻穴水次雜蛙唱豈有勢必爭羣以力相尚幽人洞物情羅取就盆盎無聲出指揮快意見跳浪初合猶兩疑再鼓乃齊抗摽抶猛士心奮迅良馬狀大鳴類譹呼小利增跌宕遞進恍尋讐獨勝欣得將旁觀識强弱萬事有得喪一笑天地間孤懷足閒暢贈山居者長如野鹿依巖宿偶與流泉出谷行從被遊人問霜樹都來知邑不知名遣懷過眼煙雲忽若馳投閒林壑雅相宜飄風蹤跡青蠅管素月心情白墮知學道還應輸意怠無權爭擬問窮竒近來解識逍遙趣溟海蓬蒿信所期題大木所寄晴川集後前年送君往武昌贈君束錦充詩囊男兒手持三寸管取快正在江山長鸚鵡洲邊久留滯身騎黃鶴追鳳凰歸來爛漫出妙句頗疑胸已收三湘我時縱觀屢擊節頓從塵垢生清凉矧今削跡處窮谷逺寄無異瓊琳琅楚騷風流日凌替吾道欲付多岐羊巨手有力惜不用蠶魚路塞誰開張漁洋詩翁老於事一一狎視海鳥翔賞拔題品什六七時放瓦釜參宫商蘇門上客雖旅進未許與子為秦黃兹集評㸃信精審莫遣流輩輕料量傳聲吠影兩無當口似昭曠心蒼茫我昔有志峻格律失足羅網緣謗傷人謂意氣定衰减詎知膽力猶堅剛會與五嶽果夙約獨乘莽眇遊八方他年自擕三萬首要向君論抗雁行酬王阮亭先生見寄三首生長山水窟新歸似乍經書來羡巖瀑夢去畏山靈醉遣池魚見吟教谷鳥聽追遊失仙侣悵望向晨星不為耽閒寂終朝坐擁書敢銜湘水怨祇傍漆園居噫氣飄風外忘形大癭餘猶多竒字在載酒欲誰如何事中朝舊他年願卜鄰乘時朱虎讓失意綺黃親斜日依臺柏驚風蕩塞塵請公樹竒績容我樂芳春感懷朔雲南雁思騰騰薄暮􅑀闌百感增豈有聲名折官職却將山水換賓朋壺觴佳興從看減海嶽前期未可憑寂寞吟情相伴在自持詩卷映寒燈對雪寄凖提庵融上人羡爾安禪處寥寥逺垢氛鐘聲出山雪精舍在松雲橋迥風常合門閒水自分定中應有喻遲我共知聞贈徹禪師昔在大都遊每過前朝寺習聞鐘梵音似會西來意夙因應有在往往形夢寐若欲歸參求蓄懷久難遂近獲出樊籠忽若醒宿醉已將心向空彌覺身為纍假憂息諸緣藉病謝萬事憑誰作導師為語第一義眼中數緇流潦倒難位置髙者盛威容出入陳軒騎餘者競壟斷蠅營殉財利文章竊皮毛貴游倚聲氣鄙夫多附和市兒有吐棄咄咄清淨門到此土委地師獨山中居不與彼同器躬耕孝事母儒者或負愧我今一相見顔狀覺頓異語言行住外宗㫖復何寄俯首欲借問顧慙非上智塵根除未盡如盲遽求視惟當安鈍拙且免逐臭味去師禪棲近亂山接葱翠藜杖與芒屩招尋亦良易請結物外交人間共游戲園亭寓目經月不出郭池臺今暫過岸融看水減花晚逼寒多烟意濃歸栁山容緑上蛾便應隨日至春事莫蹉跎社日濃花有信煩風伯微雨何緣乞社公莫上髙樓看栁色春愁多在暮山中遣懷三首所思在何許乃在扶桑東褰裳海騰沸遊目天空濛手引三足烏一照天下紅倦攲蓬萊作髙枕企腳直上方壺員嶠之顛峯夢回忽覩水清淺坐恐飛土揚驚風九州猶變滅何況羣沙蟲局蹐復局蹐不如掉頭拊髀隨鴻䝉所思在何許三江連五湖逺追鴟夷步近慕烟波徒當時泛舟浮家處至今惟有雁鶩鳴相呼沉沉千尋淵下有如山魚春風艷桃李吹落不須臾浮雲蔽天白日暗逝川長此東南輸局蹐復局蹐不如刺船徑去偕妻孥所思在何許乃在桃花源清時欲焉避但羡山中田穠桃成障閟山口漁人何自來梯攀靈境隨閉塞恥與濁世通人烟至今閲千載想見桑麻雞犬還依然藉令無地列阡陌居人仍須絶粒求神仙丈夫短氣向家室宇宙雖大如籠樊局蹐復局蹐愁對屋外山花繁園林題感栁眼青青媚烟景竹風謖謖帶寒聲生人有意從憐取一種春來各自情春寒乍看曉色漾簾鈎不覺輕寒著布裘風力峭於秋扇發雨絲細若夏蠶抽分從濁酒尋前醉恥向東君訴舊愁有約山椒探花信春情爭被夢勾留三月十五日大雪似與梨花競曉開春工有意縞樓臺餘寒好為邀殘夢遮莫天門賀瑞回西城别墅十三詠為阮亭侍郎作石帆亭孤亭擁石帆百雉列髙岸達人休天鈞舟陸豈殊觀坐鼓滄浪音髣佛中流半樵唱軒日暮敞軒窗野色逺浮動樵歌發何處偶被林風送和我洛生吟陋彼輿人誦半偈閣千偈本無言云何作半想譬如調一絃堂室各應響君聽手指音故出絲桐上大椿軒莊生夸大椿意似悲朝菌春秋八千歲屈指終有畛何如靜者心一息古今盡雙松書塢手把一卷書日夕雙松陰風過幽響激月出蒼翠深莫羡芳樹姿保君遲暮心小華子岡髙岡陟無時拄杖戛石齒遙山沒飛鳥秋色復如此不識追陪者誰為裴處士小善卷洞古石氣幽林巒護蕭摵無事此焚香坐愛香烟碧自悟夙生因海山見靈跡春草池岸草衣裙色萋萋媚烟景池水古鏡明照盡青春影懸知佳句成不待清夢醒三峯海客炫靈竒口出三神山乘風去萬里終古何時還且移太華形置我庭戶間嘯臺長嘯臨髙臺川谷逺相應林靄忽自開風籟久未定奚假鸞鳳音所期嵇阮聽石丈大塊肖有形真人託不朽坐任苔侵衣卧覺栁生肘年年好面顔甚愧丈人厚竹徑修竹藹貞萋四序一蕭索野客擕琴來仄徑穿林薄不愁步屧迷前有導行鶴緑蘿書屋數椽覆緑蘿四壁繪霜雨中有披髮翁雅調抗千古余亦絶俗人和歌出商羽寄劉波山編修修篁密樹足凉颸池外朱炎坐不知忽憶槐陰遮巷北從君索喫冷淘時追尋噩夢覺猶憎十載衣塵滌未能學築滄浪亭子好蒼茫不共酒人登寄新詩與門人謝文洽編修繫以絶句狂風寥落在人間館閣文章已盡刪好為流傳閒適句莫教謠諑到溪山閏月七夕晚雲不散垂垂雨烏鵲爭飛一一回未必天孫思再渡世間兒女浪相猜望雲門山輕烟漾午晴十里見山月稍觀飛鳥度始識一峯闕雲生自吞吐天回忽穿穴秋風從中吹萬樹離披列空象藴真境仙跡傳幽絶恨身無羽毛從兹棄塵紲感事二首碧山勝賞已全非誰向西州淚滿衣解識貴官能續命可憐疏傅枉知機㦸矜底事各紛紛萬事秋風捲亂雲誰信武安作黃土人間無恙灌將軍壬申元日元日首四序曜靈明萬方萬方起同時相擕拜天光海風驅陰翳絳氣連西荒踆烏始飛出翩然棲扶桑蚩蚩橫目民毫髮得所將豈知造化工但謂開闔常今兹值沉冥理數難推詳星辰夜斂避雲霧朝披猖狂飈挾飛塵萬彚皆摧藏山川與城郭一氣迷烟霜午景忽躍然回光不滿墻蕩摩見蒼黑倐爍成虧傷螮蝀潛莫指羲和走且僵坐令陽德微下土將何望鄉黨紛童叟相視各倉皇人情詫未覩沸語如蜩螳余時力疾起空庭獨相羊頗聞儒者言薄蝕非災祥兩曜有交會奚事分柔剛四海方清寧三公理陰陽大庭用鼓幣下士為秕糠年嵗不我遺青春獲舊亡深居聊取適戶外天蒼茫棄婦詞兩姓無端合亦復無故分昔時鴛鴦翼今日東西雲浮雲本隨風妾心自不同君心劇無定見棄如枯蓬出門拜姑嫜十步一回顧心傷雙履跡一一來時路留妾明月珠新人為耳璫不恨奪妍寵猶得依君傍寶鏡守故奩上有君家塵持將不忍拂舊意託相親此生一以畢中懷何日宣願得金光草與君駐長年春日園亭有懷飛絮滿天地春風餘幾時孤亭臨暮景久坐忽相思野水浮烟逺空山落照遲佳人不可見浩蕩憶前期三徑栁絮晴方落山花雨更香苔痕雙木屐池影一繩牀待月觀魚靜因風聽鳥長春來陶處士三徑未全荒閒園閒園坐長日水木共蕭森疏竹風前合清池雨後深逺山無定色幽鳥自多音霞外餘孤賞泠然不可尋伏日谷口羣峯障火雲水風送日易斜曛拔刀割肉非吾事自折荷花遺細君暮大雨晚風吹不極飛雨浩無邊日月皆歸海蛟龍亂上天櫩聲通竹樹雲影泛山川慘淡為霖意安居獨惘然野興蕎花開處朦朧逺春雪輕埋草半青豆莢肥時紛歷亂錯疑蔟葉總蠶形有年比屋迎田祖無事從余說孝經傳語霜風須著意安排醉眼眺林坰早行學劍南體啓明煜煜沈東方欲陰欲晴天正凉日腳插地若飛火雨氣過山疑始霜雞驚人語出村樹馬戀夜飼投秋場市門一老笑相問忽入城府君安忙臨淄道中懷古秋騎羸馬營邱道千里齊風入舊聞雞狗有雄還自許淄澠無味底須分原頭寒意離離草海上朝光疊疊雲幾度爽鳩增太息牛山長傍景公墳過郡城故座主馮文毅公宅難憑楚些遣離憂搖落非關怨素秋夢斷雲烟還北闕醉餘城郭忽西州馬嘶荒草無鞭䇿燕過雕梁自去留回首春明萬楊栁幾多飛葉赴東流出郭朝來微雨過出郭覽秋容烟隱初生日雲添不住峯年知古原草心寂寺樓鐘濯足巨洋水海山尋舊蹤微雨道中書所見西風吹霧白難收沙引清淄入地流緑樹連天村暗雨牛山何處見全牛牛山西麓溫泉崔嵬萬古邱石腹出清泚不知華清池水色何如此我來飲瓊液臨去洗塵耳濁穢乃名髙於兹識所止寄唐豹巖先輩村居欲叩城西白板扉逢時觸事與心違亂山約馬匆匆過落日將雲片片飛野水半篙誰喚渡敝廬十步且言歸空餘借鴿樓中月分取秋光上素衣寄洪昉思垂堂髙坐本難安身外鴻毛擲一官獨抱焦桐俯流水哀音還為董庭蘭自郡歸多病索居兩月未嘗著筆雪後將赴新城遽成長句病來詩思不勝秋紅葉黃花索莫休出郭即知山意好閉門恐向北風愁所嗟龍性常牽俗豈為瑤車慕逺遊會得髙人佳興否雪中驢子灞橋頭春日郡城無酒言懷城中三日風野客迷朝昏誤疑酒所致豈知未霑唇愁疾强扶䇿況復拋青春遣尋諸從事往往皆賢人凌陰戀權勢太皥幾退奔冰花耀枝柯桃李不敢嗔寒威入衣袂鼻氣增酸辛安得一瓢佳生我四體溫敝廬有贏藏風味清而醇瓶罌二百里失計單車輪戶庭能免咎嗜欲恐汨真太息稷下士古言誰與論醉歌贈同年張薛杜三廣文秋谷先生怕孤悶青衫席帽來州郡春風三日栁滿天自擁犂騧鞭不進廣城如夢身自藏故友如烟誰可問三公何意相隨來各將竒兵赴愁陳薛張幾日别海鷗皆海上人風格雖寒故清峻杜生與我齊飛揚酒氣猶能護青鬢草年往事猶浮沈欲指雲門比離恨即今大府盛文儒學使者方在郡試士憶昔吾儕嚴韅靷九原墳草又清明同年五十三人死者十餘矣生得相逢今者僅冷官正喜少拘牽逋客還矜出塵坌解衣徑就市壚沽閉戶遙同竹溪隱不辭連醉破昏朝屋角花開雷雨迅寒食寒食寒猶甚春光底處賖風聲勒楊栁雪意逼桃花城逺山烟淡天低麥壠斜酒邊倦遊客十日覺離家清明登雲門山雲門山勢春雲橫回岡簇起如簫笙中間石氣忽决坼古鏡照耀懸窗櫺下臨齊城月華滿桂樹掩映江山形憑闌駐馬每望見恐是閶闔無由登童年結願墮世網歸來始得尋青冥郭門南畔踏芳草天氣正喜清而明仄徑延緣訝破碎顛崖近逼增峥嶸羣松離立類閽者闖然欲與人爭行山風四吹變煙霧却疑鸞鶴繽紛迎空潭古洞閟幽境待我拄杖傳鏗訇門中掉臂忽自笑虎豹不怒天關寧簷牙錯落殿交角勝地往往棲神靈王母蛾眉颯霜雪衆仙雜珮璆鏘鳴弇州山人好聲勢殘碣賸遣傖荒驚髙亭削壁覽題記千年吾愛曽空青悠然會意誰與語溪桃澗栁空含情銜杯枕石縱獨卧遊人但怪顔何赬連峯西去浮落日歸心逺目相牽縈城闉回首動暝色大星一㸃留光晶通天匙鑰倘可乞我欲翻飛朝太清山中石刻文字甚多非浮即俚惟曽子宣率僚屬及六子遊山題名書法雅逸如新似空青居士紆筆紆子宣第二子也東峯有留弇亭藏弇州山人王世貞詩碣亦不佳訪友村居麥與栁深淺柴門相映開春風無間處野客有時來語久雲景變主人歡酒杯醉餘應自去微雨莫相催不過怡園二首城日山烟鎖寂寥石闌苔徑望迢遙遊人自上清音閣流水還過後樂橋堂榭虛閒碧沼清長天無主自陰晴最憐荷葉兼蕉葉送盡風聲復雨聲因園雜興四首雨過空山草木香軒窗緑重午生凉流鶯聲滑幽眠熟但道人間白日長臺上松風吹野烟峩眉新黛逺相連不須更翦青梧葉已見山椒六六泉泉出石壁下壁有前人題名稱六六子余因取以名之清池一曲浸回廊斜日朱魚爛有光負手巡簷喚魚晚野風時送棗花香林巒佳處日平西竹柏無烟咫尺迷山月漸髙人影寂溪南還有鵓鳩啼苦雨濕雲無賴壓荒烟時遣轟雷入醉眠黯黯山城惟積水沉沉夏日更如年驕龍逆作窮秋氣赤帝空持大火權莫問郊原騎馬路碧苔青草總堪憐題文姬觀獵圖天山霜草白於雪金勒明駝行復歇賢王前行屢停鞭顧笑欲得車中憐車中美人色赬玉漢日邊風摧鬢緑旃裘乳酪鎮相親寒束芳心羞不矚健兒身手如犬鷹爭倚雕弓馳射生忽聞鳴鏑雲間響何似焦桐絃上聲題郭令公退回訖圖汾陽功業扶天日一木峩峩造唐室古來何代無魚程當時猶奪汾陽兵功臣僕固為戎首暗主驕奄齊束手軍中忽閃令公旗回鶻十萬如伏雌連營奔散晨星滅戰馬不驚笳吹咽入關空破雁門煙出塞惟將漢家月長安一日啓九門手持畿甸奉至尊辟雍將將髙座矗諸生聽說覆公餗薄薄酒薄薄酒勝茶湯不信試酌與君嘗雲陰月黑旅夜長孤燈照夢隔故鄉輕寒被體如雪霜此時細引不成醉栩栩自覺春風香擬陪瑤池宴髙冠揖穆皇玉女八九人紫霞勸天漿不然沉香亭戲草清平章玊手玻瓈碗葡萄豔晶光人生待此始痛飲便應長跪辭杜康借使昔遊曽快意夢之帝所安可常悲驪馬故人送我國西門贈我驪駒出瀚海北風吹鬛入寒雲千里凝冰渺相待杯中醽醁相與傾袖底珊瑚不須買騰身揮手疾於飛好爵良朋兩遺屣家居本在岱山陰一日霜蹄碎碨磊春來花發萬峯幽玉勒黃塵恣湔灑去秋縱轡訪神洲擬躡方蓬刷渤澥誰知中道忽然迷紫燕啾啾失鮮彩丈夫壯志久摧頽分學庚桑老畏壘獨憐我馬氣難降死骨甘心擲燕隗未令峻坂服鹽車忍見敝帷埋爽塏酒酣自擊唾壺殘白日回光天色改聽張翁撾鼓聊為短歌春風吹花花不開羯鼓落手聲如雷丈人脫帽散霜雪自倚摻撾送明月酒酣似欲鳴不平奮臂直與金石爭漁陽壯夫髮上指千古雄心曲中死鸚鵡西飛江漢空人間此技久難逢為君起舞花影中使我三日猶耳聾喜門人張浴日自山右來省却贈其還林扉掩亂山落日萬重翠麥黃桑椹熟黃鳥猶不至子從何處來疑是天上墜入門向我拜執手各駭視十年兩相見心跡託宵寐豈意濼水魚忽為隴水騎去年曽由濼上寄書子家太行深我昔停征轡青松拔雲雪黃河綴天地極知登覽優敢謂經行易相尋無險難子真饒古意藏酒當盡傾欲去更同醉持我逺遊心千里為傳致寄博興杜廣文山窗枕前水北落錦秋湖湖上故人逺山中清興孤何時欹短棹載月入菰蒲極目相思處遙天秋雁呼因園集卷三
