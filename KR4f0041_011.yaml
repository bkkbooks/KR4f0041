body:
  text: 因園集卷十一左贊善趙執信撰回帆集將之江寧與南村聨舟暮發暮冬十二日三年潛菰蘆每出昧所往揚舲無逺近都未愜夢想今朝偕舊侣忽欲成北上歸計尚迷漫客心且浩蕩波寒山啓途日落風送響篷底對微醺笑言聽蕩漿曉過惠山口號示兒慶此行將為之婚陽烏棲柁送江關坐爾萍流老未閒貌我龍鍾入寒日荒烟落木九龍山奔牛遇雪呈南村交期垂盡暫同舟八口飄零感未休一瞬南來還北去三年風雪度奔牛將至鎮江漕艘壅塞河淺不可以前南村由丹徒閘覓江舟余以肩輿山行兒子騎驢從之是日大風寒止江口觀音庵寒潮夜上二十里萬楫交爭三尺水舴艋失勢涸轍鮒籃筍多情躍氷鯉故人寸步依江南死守窮波遲挂帆稚子衝風行不顧揮鞭導我緣山去盤回犖確陟層巔恍忽思歸夢中路青松離離映城堞江色空明與山接問君拔腳歷千尋何似低頭藏一葉信穿闤闠臨江頭僧房茗粥能邀留却憐比日同酬唱復作東西逺相望夜宿觀音庵不寐長宵風逼劇寒生引盡深杯醉故輕雪色侵龕燈半壁江聲撼夢月三更未成洗鉢金山寺翻遣聞雞鐡罋城為報僧雛催曉梵暮年心地聽教清明日買棹南村昏暮亦至乘夜遂濟江待君終日坐心與水瀠回大舶淩風至髙帆冒夜開乘槎近星月破浪入雲雷却訝剡溪棹携將安道來曉大雪順風張帆行大江中竟日日暮抵觀音門外海雲祕日朝光黝潮擁江回水西走浮玉便娟尚趁人鍾阜英靈已招手篙師捩柁與寒爭風伯催帆向空守雪花有意紛斜來助我推篷喚沽酒兩山夾岸獻瓊瑶萬里平波糝星斗葭蘆影亂渚烟空鳧雁聲多凍雲厚是時舟中心目開共說平生未曾有太行峻聳坤輿脊田盤幽探滄海口曾經積雪遍峯巒未免遊蹤倦培塿何如坐卧恣中流賞麗摉竒在襟肘不愁短晷失奄忽頓覺長江吞八九幕府山頭落晚鐘草年頗憶曾來否題燕子磯淩波掠雪似飛飛千古長巢在翠微桁斷何由半朱雀巷深底處覓烏衣江山社換無來去宫殿春殘有是非贏得扁舟南北客風髙日落鎮相依寄寓朝天宫飛霞閣殘冬日月忽闌珊暫託仙居夢亦間愛向飛霞啓東牖半城晴雪映鍾山新春獨遊莫愁湖上望石頭殷勤江南春慰我逺為客東風引逰心忽落城西陌湖光漾微晴山意動新碧偶逢亭榭連遙喜舳艫隔岸栁鬱未舒水烟淡逾積飄蕩兩蜻蛉凋殘幾家國地形長虎踞鼎兆屢龜坼峩峩帝王業瓦石同狼藉天子與佳人俱供後歎息兵戈或取快粉黛乃增惜宴坐歌無愁酒徒信良畫跂足傍魚庵沙禽飛格磔南村將携家附漕艘北返見邀小飲話别贈之十六韻擬作餘生别重論半世交盟心渺京邑揮手黯江郊往事蕉覆鹿浮名星繫匏蜂遊千畝失蝸鬬一官拋花月迷牀笫金蘭誤斗筲自矜身皎皎人怪氣烋烋粵嶠懸輿誦吳閶集客嘲藏孥輕鼠穴避地愛鳩巢有意營三窟無師禦二崤羊公慙舞鶴周子耐潛蛟老飲情偏减窮吟體更拗仙期耽鍊石妄夢泥觀爻故國虛風木他鄉戀畫橈真成魚在釡始見芥辭坳冉冉分南北匆匆對酒肴臨岐翻贈䇿為我挂船艄晚行句容道中見月寒靄淡平川松風散暮烟江回天北望月試嵗初弦衰病青陽外行藏句曲前歸程任顚倒客舍待團圓行次丹陽登舟口號二絶句示慶野曠日曈曈輕塵撲袂紅蹇驢渾不進應是打頭風歸夢迷揮䇿連宵屬岱雲吳歈轉柔櫓重向月中聞上元前夕却歸寓舍紅蘭燈火遞相催白板林扉久始開船尾潛移春淡沱樓頭髙引月徘徊情牽五嶽婚還嫁興盡三江去又來且與妻孥話風雪屠蘇遙接嵗除杯虎邱玉蘭傳是齊梁間物春風不戀梵王家繡嶺荒凉紺殿斜西望六朝文物在辛夷閒放最髙花門外菜花大放日倚閒門對野塘愛看十頃菜花黃栁因烟讓分明色麥向風偷散漫香夜半霏微經好雨溪頭平逺放斜陽春來每載兼旬酒擬換他鄉作醉鄉為菜花語風神寄謝封家十八姨三春二已不多時黃金狼藉那收得莫倚顚狂抵死吹何樊圃携慶自西山返各述所歷因憶湖山舊遊昔我遊石湖月滿秋水盛湖影與蟾光天地兩明鏡旋艫入支硎黃葉糝幽徑戛石一枝笻穿雲數聲磬斯時饒勝情亦復能濟勝坐使具區涯羣山期涖盟春帆挂濃雨風力因寒徑一瞬失靈巖吳宫莽寥敻未追朱公泛且得鄧尉迎晚霽虎山橋湖山動晶瑩月上縹眇峯廽與西崦映却笑西子湖近人如妾媵晴光曉斂灎香氣日奔迸一昔四十里梅花漫林坰外拔峯巒周中積玉雪賸三萬六千頃晃朗欲相競平生登覽懷爛漫兹遊罄歸路穹窿顛曠奧皆徑庭憶從鳥還巢翻覺獸在穽重來足滯留欲出奈羸病譬如今年舟水落不可榜四度過花時三生罷佳興君能抵掌談兒學擁鼻詠馳想踞繩牀烟嵐滿清聽諸葛菜半庭紫豔映青苔丞相軍中舊種來千古英雄羡名士並時讎敵歎竒才星沉陳石闌江列春聚營花匝地開為問鄴都并洛下荒榛殘甓不堪哀暮春送仲生偕慶遊虞山吳地春事喧今年減大半偶因長官嚴頓覺風流變香花冷僧寮裾屐空仙觀寥落千人石笙歌付夢幻支硎松篁叢禽鳥樂相喚嬌女紅閨啼長年畫舫怨疇昔尋春人扄户亦愁歎始憐韻士懷非為幽境戀小兒好事日日聒山水縣熟知乃公意常在破龍澗吾子滄海期已寄徂徠畔未免故鄉心臨行彌繾綣似聞簫鼓聲不畏旌門逺放櫂及佳時巖花正凌亂贈山陽程逺復程生意氣傾四海騎虎攀龍一身在半生賔客散如雲可憐誰繡平原君黃金百萬隨手盡猶倚雄豪不解貧前年酌我濰水上一石鯨吞不相讓今年過我闔廬城笑談欲盡今古情丈夫方寸納五嶽那得人間無不平我行雖迫白日暮西望槃散作徐步閬風縹眇弱水深想像颷車引前路君才與年俱莫當且復斂頴囊中藏斗牛紫氣常浮動定有張雷識劍光池上歸興四首三年池上劚蕭萊手種荷花今再開老栁久拋青眼送故山屢趣白頭回杜陵潭北終須去庾信江南劇可哀未免違他慈氏戒連宵桑下苦低徊郊居風味賦來真不道元非土著身盡室兒童音語換比鄰雞狗應聲馴門當粳稻關晴雨溪有魚蝦結主賔莫待秋風剛舍去紫菱紅芡倍留人經年坐卧小樓中日夕搘頤望不同亂灑松聲楓葉雨平翻麥浪菜花風池光浸牖天如鏡林影穿帷月似弓最是勾留魂夢在畫船居岸桂成叢卜築初心擬隱淪投林揮手莫逡巡漂搖屋宇慙新主老大文章想替人逺海忽傳珠徙日髙梧長憶鳯棲晨書窗映竹題詩處未必官奴與掃塵歸舟望齊門外望青州一室歡聲入棹謳十幅風帆半城月最難圖畫是歸舟是夕泊胥江茶竈餘溫尚未休全家已到水西頭胥江舊是關情地來即盤桓去却留舟中題别四首移家行不易猶傍越來溪但道興亡忽難將去住齊舊交知落落前路覺凄凄曉月偏無賴拋人獨向西頻年居北郭豈是卜南村唱和無一友招邀能幾門程書困毛穎止酒病文園此際成追憶中懷已不存逺聞吳季子髙義至今空自許言辭熱相矜酒䏑工情輸船尾柁事繫渡頭風道是華胥國元來一夢中久住我自厭將行人罕知黃金憐汨沒青翰喜推移地豈千年改才應二陸遺如何相送處不見一篇詩風雨早發呈同舟何翁南風稔識客心懸曙色沉沉促放船川漲十分挾梅雨山光一帶蕩菰烟城闉好憶遼東鶴津路閒論絳縣年誰似洛中諸好事解呼李郭作神仙行次樂社念協兩兒却從後至蓋自故鄉來迓亦以雨夜泊湖墅舟相近而不知也濕雲初散蘭陵道乾鵲登桅喚清曉舟人息􅀈理帆蒲歸客憑舷玩烟草忽從逺岸聞招呼急足追奔似飛鳥回看一艇三數人半翳低篷難了了須臾二子過船來相與喜笑還驚猜中途寄語教坐待何事匆匆輕往回答言小向揚州住眼見長江心欲渡朝朝倚柁問篙師夜夜懸燈認津樹昨日晨過吳市門婦孺皆言已歸去却憑關吏指分明宛在前宵同泊處是時大雨如翻盆船船相並不相聞詎知岐路生夢寐一寸波光萬里分老夫垂頭長太息由來物理無窮極天地山川反覆時父子當前不能識何况悠悠世上情空馳南北勞吾生正逢午霽解維好互語家園我卧聽雨泊京口驛去端陽數日矣江頭繫纜坐清深愛聽潮聲厭市音酒自六朝何薄薄雨經三日故愔愔空餘滄海乘桴興無復春波接葉心聞道魚龍嬉戲絶金焦晴色尚堪尋仲生及三兒子冒雨登金山江山日無事雨中山有情行教鷗鳥引身落畫圖輕攀塔呼羲御巡欄歷化城僧寮憑寄問經嵗幾逢迎細雨渡江江雨已無時歸心坐汗漫移舟方暝隂鼓柁遂平旦風威乍衰歇潮勢小淩亂放目極東溟收神投北岸往來三十年自許知津慣詎料大江中修途有遷變疇昔談家洲雲樹浩沃衍上天下息壤橫割中流半西來萬里波迫蹙強回旋金山復後逼對壘日挑戰蛟龍束約中盤礴每騰竄行舟出其間紆折避湍悍長年互手語過客疑夢幻矯首望名藍蜃市忽隱見近知陽侯意擬使桑田換水弱能侵蝕地久易渙散俄然失洲渚不假走雷電潮濤如鼓舞魚龍亦矜炫直馳赴海門千里一飛箭平平揚子渡去險就清宴浮玉倍分明金碧堆素練何人解鄉導路繞三山面帆搖塔影迷掉戛闌干遍列牖與篷窗相依乍宛轉我時臨船舷婦子同賞歎昔來所指似今者充近玩兼存溯游興不苦攀躋倦江山具賔主烟雨荷祖餞勝境况創闢離情彌眷戀歸語曽遊人南風起遙羡端午抵揚州假寓於使院之前鹺賈之館頗寬潔有竹數十竿圖歸觸炎暑中路仍滯留就喧與居卑豈復郊原幽蕪城百萬家皋廡不可求江山一區隔花月千載羞猶喜鹺使者避我停真州門前荒草積日夕鼓吹休紛飛附臭蠅奔散當車牛遺此虛閒館可以坐待秋庭前有此君風雨相綢繆主人不願識聊比王子猷亡友王羲文之子携酒見過眼中磊落見王郎地下交遊失老蒼離合栖栖遍南北往來冉冉判存亡素琴挂壁空留水長笛臨風易夕陽強作清談不成醉甘年前是此蒲觴初訂交以庚辰五月王竹村招飲北郭園亭幽徑萬琅玕森沉夏欲寒酒人愛亭館詩客賞林巒畫舫清池外紅橋緑樹端斜陽連北郭金碧一橫看有以詩卷見遺者自題曰江南某戲成絶句黃金白雪本岐途濫耳何人解聽竽自許周郎擅江左不知消得小喬無遙寄程逺復江寧閒把松枝坐竹風道林蕉萃罷談空如何一片韓陵石逺在雨苔烟草中李山甫詩雨苔烟草石城秋題王鍊師潮上新居師能醫與余有山中之約萬頃波光裏平添屋一區焦庵惟結草董杏偶論株飢鳯下依竹蟄龍深飬珠太山阿閣在莫只戀菰蘆逺復自江寧來見邀城東吳氏園賞桂花出郭野望逺到門秋樹深相將轉幽徑何處慕遙岑香向小庭發人因佳霽尋微風散杯斚斜日襲衣襟競作詩騷語難通醉飽心鍾期江上至使我愛橫琴惲氏園梧隂竹徑積苔痕石壓闌干水浸門二十年來盛衰事試憑遊客問名園戲題王九蘧莊詩卷因呈其兄竹村並賞分評何所似天台連接赤城霞輞川漫著裴居士相國元來大作家重九前得家書知協妻亡因遣其以車重先返使爾先歸我後期蓬蓬南北本難知己甘半了餘生債何意平添久客悲下澤車輕載書賸稠桑店僻覓程遲可能里舍初還日剛及天涯好去時廣陵湖錢塘八月湖如雪月滿風髙更竒絶無緣却到廣陵城羅剎難移吼怒聲漢代枚生妙騷賦指㸃王家舊封處千年文事不分明競倚䢴江咏秋暮驕龍昨夜吞五湖茫茫海底沉陶朱驚濤真入揚州郭一舸空悲文大夫寒雨移居北風吹雨如亂麻還家客子遠移家不嫌觸事得瑣碎但願隨地無喧譁巷狹兼聞絶冷僻屋稀正喜非新華輿僕暮行郭索蟹妻孥寒入盤屈蛇樓頭可以見帆檣户外亦復賣魚蝦鄰無卜處謝王翰酒有載者充侯芭行藏斟酌漸解籜嵗月參差屢及瓜更餘一遷向何許氷雪湖隄薄笨車留别逺復卧病卯酒鵝黃夜蠟紅留連話别未匆匆驚心歸客成衰久回首情交在病中入舍空多彈鋏士同車無復抱關翁相思此後腸何似汶水千回却向東召伯鎮别王鍊師趣途辭水宿蘆舍訝初暝強偕僕圉情未適麋鹿性故人携酒來清言引幽聽魚罾帶月供馬䇿臨墟贈道心緣時深塵慮入山定莫負春風期為君掃松徑淮安客舍題感伏波慣作賈胡留偏向山陽一夕休長老無緣重問訊少年何必共言愁凋空桃李松應凛食到魚蝦虎亦羞况復歸心似清濟寒烟一道貫河流郯城道中炊烟葱翠逼寒新傾蓋亭前憩馬茵遺老含悽說生事今年餅餌屬行人山行遙寄何翁畸士仙蹤未易攀窶人好語且須刪怪來郭璞藏身地只是因依浮玉山大雪過十八里嶺嶺半下見新泰縣羣山如故人走迓二百里風雪亦有情掀飛作狂喜嶅峯後依依寒翠入我指曉與驛塵辭幽意引行李初尋困梯攀前歷得邐迆僕夫愁崖谷客興超泥滓西望泰山雲冥濛擁雄峙近臨稍開豁烟火見蕞爾一身蹉跌餘萬象迷漫裏盟心謝英靈終焉託畏壘顔莊即目溪水彎環落雪痕亂山髙下盡當門漁舟添箇溪頭纜便是江南黃葉村村宿嘗新釀調仲生比年對飲杯在手只憶家山寒夜酒今宵與子細細斟頗謂老夫失言否京口百花香透罌南潯淡泊秋露清酒人猶自意索莫但覺平原醉不成何如雪後開新甕金粟晶晶㸃霜重竹爐煎出寒作輕玉碗盛來空不動口辛喉滑到臍甘倉猝滿引能微酣從此桓公老從事應傳别譜過江南河莊戲題欲知太行摧車道扶羊嶺頭雪初曉欲知蜀棧天低路青石關前冬已暮深山犯難誰相從吳兒使馬如擾龍不如倚柁聽歌好淄水塵沙愁殺儂問弟姪兒孫來迎者憐余為客久迎勞見情親忽憶前相送而今减幾人因園集卷十一
