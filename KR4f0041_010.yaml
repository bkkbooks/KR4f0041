body:
  text: 因園集卷十左贊善趙執信撰金鵝館集元日野行至虎邱訪汪叟山居嵗朝連逹明舉世狂奔走火盡爆竹寂於人竟何有老夫睡足起小飲隔年酒扶杖歷溪橋傾心嚮山叟微隂水淡沱餘烈風䬀飀莫厭野荒涼會見春花栁望塔屢促步叩門乍携手案有設肴核胸無宿塵垢談言出煙霞歸路迷林藪試問今日人頗復有此否贈何樊圃本吳人今家杭州何生天下士逸氣凌太虛心隨鴻蒙遊家傍湖海居才大不可降入世憎拘迂偶然涉技術管郭遂並驅胸羅山川祕手握造化樞平生仁智情藉此聊發攄豪吟愁憤中縱飲衰病餘去吳四十年作客來鄉閭余昔飄忽别再見悲喜俱雖對鬚鬢改未覺肺腑殊往事空鬱積古風久淪胥流萍須臾聚逝水晝夜輸恆恐宇宙狹未易容此軀茫茫吳越間豈乏幽遐區憑君語山靈為我開雲衢大地何處避諸緣倘自踈棼絲斷婚嫁急景收桑榆薇枯紫芝長偕往無趦趄泛楊城湖春江屈注漾澄波門趁無風有日過薄暮回帆覺船重酒邉鄉思載來多上元觀演長生殿劇十絶句傾國爭誇天寶時才人例解説相思三生影響陳鴻傳一種風情白傅詩遙指仙山喚太真華清一浴斬然新怪來宇內求難得元在深閨未識人脂粉無由汙淡妝雙飛端合在昭陽酷憐姊妹開來豔虛憶梅花冷處香溫泉清滑浸芙蓉玉女飛來太華峯石作鳧魚猶觸忤那教取次近豬龍月殿酣歌夢許攀輕將仙樂落人間笑他穆滿無情思身到瑶池白手還垂老荒迷花月場臨淄英略未銷亡投珠抵璧尋常事夙遣元臣駐朔方蜀山秋雨感飄零殘夢頻回舊驛亭妙寫鈴聲入新曲可能渾似月中聽牛女經年夢亦慵翻從人世管情蹤玉妃應有婚姻牘才過開元便得逢黃泉碧落事荒哉差勝樓船去不回本與求仙情味别何嘗身欲到蓬萊清歌重引昔歡場燈月何人共此堂六百餘年尋覆轍莵裘怪底近滄浪余以此劇被放事迹頗類蘇子美昔過蘇州有句云間道滄浪有遺築故應許我問莵裘止酒年衰萬事倦對酒意多違自識今能否誰論昔是非攝生甘寂寂頌德尚依依從此髙陽侣應憐不醉歸春日間居雜興慣作吳中客偏於池上居波光映朝夕春色媚階除老栁煙絲轉新桃火齊舒緑斜緣壁蔦白小避人魚石迸微抽筍庭荒自茁蔬開門見牟麥乞友種芙蕖溪唱催鳴櫓鄰簫落步虛晏家從近市陳巷不容車西蜀經營始遼東漂泊餘生涯賸艱食俯仰愧樵漁留仲生去年悵望往來舟今日荒齋獨爾留濠上樂魚偕惠子竹間羈馬得之罘珠辭合浦還應誤璞匿荆山獻已羞眼見蟲沙滿城郭休從户外覔交遊王羲文自揚州再至前年相見江干雪去年相送霜林月祗今就我及深春桃花栁花迎故人蕭條客舍住經時我不飲酒君無詩日夕髙談不知厭繩牀竹杖俯清池疇曩追尋足哀樂此意要令兒輩覺春光冉冉隨流去投老留君復幾度贈王豁然鍊師一笠一拂子飄然何處來相看出塵壒共語坐莓苔道氣山巖祕仙期劫火催棲鄰得深穩浮海且遲回寓居新營門屋局促復局促狹巷與破屋更教蘚壁一帶隂遮斷秧田千畝緑蓑衣墩前草樹濃朝曦暮靄交翠紅早知煙景麗如此合是開門元向東林塘彎環溪流轉溪上風帆來近逺客到惟貪野色佳門前坐卧門前飲欲移勝賞入中庭池北牆頭起草亭諸君能為王録事好待秋晴携酒至王鍊師之洞庭東山因寄所主席氏羡君家傍林屋居碧琉璃上開精廬偶經殿陛一噀酒歸卧煙霞惟著書我欲携笻逺相訪莫釐峯下恣來往聞道松雲擁翠微此中豈有塵埃想長抱心情奈病何洞天窈窕許誰過淩秋遙見赤松子直駕蒼虬劈白波老僕自故鄉來省候投筯聞人至中懷詎得舒殘年親舊僕久客怯鄉書弟姪存亡隔田疇水旱餘飄零尚多纍愧爾逺求余王南村重寓虎邱旋之西湖訪其表弟錢塘令身落江南夢不移飛烏三匝未安枝湖山風月年年改爭遣人心似舊時錢塘明府賢中外應向花前説故鄉莫只臨波愛君子忘憂容易入秋霜池北構室略如舟製小樓冠壁極望平楚日夕曠然可盡雪月之趣思光貧無屋牽船却上岸永叔作舫齋髙文世爭羡近來巧規製但欲侈輪奐往迹偶相循勝境時自獻兹廬亦人居嵗月幾遷換垣墉曖蔽虧牖户荒漫漶清暉日晃漾咫尺不可見我來運新裁無計改舊觀故交數敦迫合力佐營辦因材幸不乏闢地復何憚初矜外間敞漸覺內清宴遂就佳簷楹水木灑然變四窗終日開城郭充近玩山影墨池中人聲碧天半昔賢欣頡頑幽賞恣昏旦秋月正徘徊稻香復爛漫過從素心人文酒期無間雪際剡棹輕花時漁路逺暫成避地蹤未適逃名願倘披髙士編應愧梁鴻傳虎邱暮歸小舟口號稻花菱葉滿流波秋色其如夕照何暝泛不知柔櫓亂前川微月雁聲多聞南村説近日西湖成五絶句昔遊恍惚失東隅聽向尊前與恨俱羡爾輕舠去來處他年雞絮得將無花月爭邀半醉天風光何似紹興年已知歌舞休來久留取湖山作可憐平湖空水不容魚人迹誰侵處士居放鶴亭依黃屋在更將封禪較相如風篁松栝匝幽扉日日悲風捲落暉擬上髙峯喚西子分將濃抹屬明妃空山清夢閉煙蘿重阻江南一帶波憶與漁洋解嘲語平生六一未經過阮翁未至西湖深以為憾每引歐陽公以自解池上桂花重九前始放微雨暮來過樓窗香自生枝頭少女定池面上弦明物色三秋逝淹留一徑成故叢黃綻否近節倍含情生别離為友人作生别離奈病何枕邉一掬淚江上千里波秋風吹隴鳥却向來時道豈不識將歸隨君異鄉好濃妝剩今夕香閣失前曉鏡裏十年容君看一時老妾意長纒綿君情寧棄捐願移君病著妾體宛轉君前不辭死南村移居師子林是故人張籲三宅遙從松吹認幽居恨賦偏成感舊餘逝水年華鳯毛短飄風計畫鵲巢虛山樓只有仙來往苔徑都無人掃除衰病飛揚前度客重尋石磴曳衣裾生涯我已入羣鷗何似君為不繫舟乞米未甘拙言語寄居猶擇好林邱擔來僕厭書填簏卧處心隨月挂樓此外惟餘我相對聽君酌酒數交遊悲南村復往金陵金盡囊空不自羞江風慣引去來舟遊人燕子磯頭見便合呼君作莫愁間清池長在竹籬前蓮葉生來倍可憐梅雨入簷侵乳燕栁風吹牖帶新蟬稽生客至無妨鍛賀老船停定好眠每擬龍沙覓消息不知間外有神仙贈鄰居黃孝亷孚五桐隂入我樓竹徑宛相接未與主人謀素心遙共悅昨來叩荆扉一笑覺全别溫溫就冬日皎皎落夏雪浮名世徒稱幽抱我默結濡足汜濫中沉吟慕髙潔菊意淡可親蘭芬近彌烈晨夕多竒文未應遺靖節夏至雨中遣興庭際寥寥起曉隂門前犖犖絶車音熟梅節過猶宜雨苦竹年來自作林但乞厨煙消白日敢期鼎藥變黃金流光又向人間短合傍江湖寄隱心東坡水車詩犖犖確確蛻骨蛇貞觀半硯詩古人不可見古物彌足珍何由劫火灰出此月半輪墨精凝體質文焰護鬼神寥寥貞觀字千載今猶新想當濡毫時得近蘭亭真文皇睿聖姿歐虞為之臣治平堯舜齊筆札羲獻親詎知几案間終起滄桑塵圭璧寧免剖干莫忽中分所幸得所歸不向俗手淪主人何如人疑是房魏孫故家與遺寶會合良有因錢刀方施行玩好各盛陳願同鼎彛藏永與詩書敦紛紛詞章客賞譽徒殷勤秋晴上弦夜何處容煙雲偶過東田别墅愛從幽僻問寬間小憩青林碧沼間解與衰翁作酬對荷花渾似昔時顔苦熱二十韻共道今年熱三吳得未曽蚩尤初燀赫閼伯故憑陵威借融風扇驕看赤日升九霄爐上覆萬彚甑中蒸避地知無處深居轉不勝晝長惟兀兀夜寂更懵懵始覺衣冠纍徐將飲啖憎汗多頭雨漬氣極腹煙騰垢膩隨身具膠黐觸手增詩書渾再火枕簟謾如氷慣浴情淫水耽眠目悸燈樊籠拘户牖刀箭戰蚊蠅羽扇救時相瓷甌耐久朋裸裎真足法剝啄底須譍醉與昏相倚棋因病不矜差勝趨府吏深愧住山僧老栁依朝蔭空池愛晚泓時寬暫蘇息吟苦逺師承人境都如夢天心詎可憑遙遙問霜雪幾日始相乘移牀移牀就池上未許便清涼所愛夜不寐荷花時送香竹近有露氣栁踈多月光妻孥與煙火漸逺漸相忘簡南村余與汪叟絶久矣分泉已謝檀香井乞火誰過師子林傳語留侯須好覓山邉黃石是黃金祗憑靈語接神君宛若無精續冠軍青鳥飛來嵗星去白頭父老夢中聞送兒念返里獨向秋風動老悲三年情事汝周知祗憐作客緣婚嫁誰信還家是别離鼓擢揮鞭南北路塞鴻江燕去來期故園諸父驚相對若箇形容似我衰知兒愚不祿人來無汝書問知汝病久憶我臨行言汝命繫於酒汝弟昨獨返強笑神憯悽新婚胡不戀我意默已疑重翻家中書漸覺心了了舉室相掩覆不向老夫道我從學道來所期在忘情未能得病愈豈肯使憂生汝既不我聽我何為汝哀天地風波惡夢中汝莫來索紙行君不見相如病免過臨卭人前車騎猶雍容程卓何知重文士偶緣令客來趨風丈夫無財亦無勢枚馬重生不能一錢值賸將書札動交遊落落明珠暗中棄多生宿垢根塵現老以虛名殉筆硯臨池却憶永浮屠一字時人輸五萬近來不擬徒揮毫微潤聊且慰啼號眠中吳兒詎得爾日日門前空索紙窮交舊識理則然金穴銅山情最鄙公等不以財事人才人何苦虛辛勤金帛與文字分不兩相親文星斂光避錢神煙霄失據糞壤尊胡為乎長卿四壁羞文君千金萬里來長門寥寥一賦狗監聞天子飄飄欲淩雲同時在廷無比倫赤車馳檄聲雷奔富人匍伏獻笑顰姓氏反賴相如存我今卜居迫荒村鶉衣魚釡三寒暄所與往還惟賤貧一彼一此梟鸞分吟詩作字強繽紛譏評賞譽皆狂昏逝將歸去北海濵退筆瘞向青山根南望但見波沄沄此中墨瀋千秋新公等齪齪何足云因園集卷十
