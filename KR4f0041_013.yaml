body:
  text: 因園集卷十三左贊善趙執信撰磺庵集望春曲嵗已換春不來所見惟氷雪日夕增皚皚春未來冬且久寒威爾何苦勸爾一杯酒天地本無私盈虛合有時但臨碧池待莫怨惠風遲有感二絶句漫天飛絮落泥塗或化流萍水一隅賸向魚蝦矜覆載不知記得本根無東君劇戲喚春回販弄羣花處處開一種風吹偶先後却教山杏妬江梅題銜月亭髙亭盡道與閒冝對雪當風酒共持輸與山翁自怡悅憑䦨月月月明時晦日大雪與仲生及子弟開南窗暢飲成雜言學歐蘇禁體閒居每愛雪助我園林幽去冬圍火坐寒意時侵裘簾隙試微瞰僅能沒瓦溝今晨偶偕二三子林下共語春和柔颯然霰先集大至風莫收驚塵有猛氣濺沫無平流驅迫入深屋各聳山肩頭衆情殊不厭撤墐呼觥籌惟有杜康劉白墮解與滕六除怨平聲讎南窗騁望得快意竒絶非可人間求羣峰晃朗相烘染萬樹匼匝爭雕鎪石路自覆荒穢净池藻細呈青翠稠中流淡搖漾恍棹山隂舟孤亭炫突兀新成天上樓神山仙闕暫飛落但恐不為東皇留當杯吟賞還儷事無使謝庭兒女羞猶勝令節對芳宴夜珠明月乘昏投長宵紅燭照白戰酒行與雪俱無休春如冬詩十二韻今春多雪少晴二月初旬雁猶南去擬將時序問天公半覺青春度若空斗柄指來元的的羲輪行處太匆匆年光飄忽隨流水氣候回環象引弓暘谷詎應長避地寒門猶道未成功盡收川嶽凋殘色散入乾坤慘淡中有信風花翻瑟縮無情雪月鎮朦朧氷山浸失支撑壯玉琯難求燮理工北户摧藏何振蟄南雲零落尚征鴻豺狼躑躅嘷溪黑兒女悲啼望曉紅深巷袁公耐枯槁敝裘晏子愛䝉茸竹爐火足能偷暖瓦缶醪香欲送窮却怪詩人緣底事雙垂冷淚向和風嘲近春花黃金偷色未分明梅傲清香菊讓榮依舊春寒苦憔悴向風却是最先迎山半花樹移就小池北栽之地髙苦風多山盡得日暖主人與春閒幽事觸何限荒園有花樹託根半􅑬嵼寒威易侵陵土脉况踈散滋分雨雪輕氣受天地淺秋葉早投地春花稀入眼對之喻懷抱終嵗鬱不展寧辭就卑遷何處覓餘堧近於小沼北撤屋出平坦未勝數弓量猶愈一席卷通流初遍潤除石漸成窽老夫獨指揮童子競往返朝至日中昃柯條坐來滿連朝晴和意有似故繾綣何以答恩私爭妍不容緩穠華衆所欣細葉我勿翦舉頭見嶮巇屏跡恣偃蹇且待緑隂繁時時來洗盞栽杜擬以接梨春風暫為護根芽池影先容細碎花好待他年落香雪垂垂玉乳滿貧家栽檍詩疏云官園種之謂之萬嵗幽巖逺去㔉雲移為愛蘭芬與雪姿莫向官園爭物色深山始有萬年枝大風惜玉蘭花池烟徑柳漫黃埃苦為辛夷酹一杯如此髙花白於雪年年偏是鬬風開山徑為塵土所埋擬疏出之三年修葺因園居造舟移亭風景殊豈免土木有委積塵灰瓦礫纒山隅清池倒影見曲折層崖幽澗愁糢糊南州髙士慣灑掃此事詎可期僮奴北風昨夜狂而急茅捲石奔水飛立掩關塞耳意欣然將謂林巒淨如拭寧知埋沒轉更多驕龍挾雨慵經過自知三徑秀而野奈此枯烟暗月何褊心忽發藍田叟盡喚鄉鄰沃以酒摉山先事㔉荆菅一日縛成三百帚暮春晦日族弟邀往山村看桃花偕諸叔登髙小飲二首閒與病相守山情猶尚存桃花半開地春雨乍霑村隨水頻紆徑緣崖自識門携笻如擁棹重入武陵源髙岡出花頂坐處欲千尋風起香偏逺烟過色更深春山世人面西日老年心往事銜杯說兒童莫厭斟即事示子弟虛閣踈林視聽清連朝偏是暢幽情墻頭柳色和山色池畔書聲亂水聲於世偶然寧復避此中有底尚難平因憐獨樂名園者却恐同心積漸生宋孫二翁見過閒居所喜在無喧日日支離學灌園已送三春如過客為迎二老忽開門風花奄冉成黃葉霜鬢婆娑映緑樽四海經遊總陳迹不堪倚醉一追論芍藥閲盡繁華委地空獨將姿格領薰風已拚富貴藩籬外漸入烟霞仿像中水畔叢深驚洛艷雨餘香重厭春工一從品作姑山雪悔向揚州識相公東坡玉盤盂詩姑山親見雪肌膚重題芍藥醖釀春光故放遲清和不失畫欄期濃香擁徑風微散艷色翻階日半欺士女有懷充報贈君王無分領歌詞壺公偏解相料理手植靈根近上池遣興二首草色斜侵磴道齊短笻長晝足攀躋清風發自小池上紅日移於深樹西暗水簷楹隨宛轉遙峯屐齒互髙低仙源黃髮閒相笑前度漁人到已迷心跡孤髙寄草亭昨宵新雨洗􅑐扃林風急處水爭響壠麥黃邉山倍青時勢空華隨現滅勞思天地竟清寧間披書帙相關者祗有浮邱相鶴經悲小女十載癡龍抱裏珠由來憐愛與悲俱偏工吳語從慈母苦誦唐詩向老夫昨過碧池猶弄水那教黃土便埋軀欲知學道忘情未曉枕無眠有嘆吁即目北窗坐長晝晴雨倐難分林影有無變溪聲髙下聞山深應隱日囊澀豈容雲解識天無定心依止觀文池荷五月已花是九家弟盆池中物去秋八月取之沉諸水而破其盆今年計可大盛報家弟訂飲賞之約園亭水木久益佳自矜不數吳中家南頭池方一百步其中詎可無荷花去嵗經營殊草草澄泓坐待慙魚鳥聞汝空齊荷正芬有花却值無主人呼童衝曉相輿致一朵伶俜露將墜不辭地迥近清寒且向波深作紅媚水仙從此住中央擁雪拋春飬暗香漸喜林風翻翠蓋俄驚山雨洗新妝時序舒遲夏才半菡蓞離離踰舊觀從拚三月水雲中身墜蓮房夢淩亂知汝踈慵罷出門好乘凉月訪黃昏牀頭幸有多瓻在償取分香老瓦盆題山前破屋柁樓背倚山前溪篷窗每啓憐溪西老屋三間破如此村農久戀成幽棲兒啼婦語當其下敗瓦殘椽莽相亞炊烟湧出雲無心天影常懸城不夜頻看鉏笠出復歸寧識全家在翠微眼中籬障撤都盡多事黃昏仍掩扉昨宵驚龍起行雨馭電排風吼雷鼓斷岸粗能撑拄牢壞墻猶得存留古敢將結構鬬鮮新風月玲瓏合與鄰但惜中非玉川子茶鐺騰沸隔波聞新蟬泉響復禽鳴閒心有底驚午窗聞嘒嘒陡覺是秋聲秋谷夜雨幽棲清夢著烟蘿奈此秋宵積雨何豈是亂泉添響急非關深谷貯風多千峯勢極趨滄海三徑心期接絳河情興尚堪衝曉在滿林飛瀑滿溪波聞王南村於去年九月病亡酤酒秣陵市送别春江頭題詩淚隨筆已識今生休渡江滯三時所至觸君迹一自掩山扉山深斷消息知君所居處近海越帝城帝城深於海造次誰敢行仙期俱渺茫魂夢各疏鈍但有舊音書那覓新聞問昨日故人子緘寄津門遙當食讀未半投箸驚長號言君雖得歸生計日已寠衰病積不支委形值秋暮含悲算嵗月相識五十年應緣夙生契肺腑久益堅出遊必逢君不限地近逺平生綴篇章憶贈他人罕交情會有盡從此隔泉扄神理如可託為君寫道經喜晴一天風日送新歡報到秋霖興已䦨林雀聲中雙牖朗瓦松花下數楹乾崢潺澗響殘朝夢蒼翠嵐光接暮寒便可琴樽遲希逸同來賦月碧雲端送仲生南歸六十韻送别三秋逺追遊七載贏捨余非失計將父自深情江引迷漫夢山銜宛轉程眼看今契闊魂斷昔逢迎作客時踰夏論交嵗在庚因依聊下榻倉猝似班荆本襲師門舊生幼受馮氏學非尋大國盟空慙我衰朽乍喜子峥嶸載酒籍恆醉稱詩郊善鳴伸眉得知巳拂袖罷求名仕路虛侯喜兒婚迫向平前驅水東返後隊雁南征岱出霜烟聳河穿霧雪橫遙憐馳馬處獨聽刺船聲躑躅舟將陸逡巡雨復晴挂帆瓜步迥僦舍越來清度嵗漏催燭懷人波漾萍屋廬連浩渺姓字沒譏評有意歌招隱無緣訂耦耕翔蒿和斥鷃跋浪失長鯨詎料拿孤榜還能覓老傖荒園携手晚村孰寄身輕來往途猶澀栖遲嵗再更石間欲移柏郭外遂遷鶯地喚金鵝館餐分玉糝羮攤書依桂緑把盞映蓮頳氣味隨時淡心期向古澄紫霞欣可託白雪調同賡兒遣從君讀貧教與道爭見多憎落落友益信硜硜旅况葭蘆厭歸心澗壑縈擬邀張翰載好慕李膺行壯齒辭親許餘春結伴成淩風上浮玉阻暑息蕪城巢羽寧知幕游鱗已在鐺傍人渾蟣蝨識客半蚊虻滄海翻何驟流星落易驚羣言任嘲哳爾咏倍噌吰往蹟摉牛斗生有蘇掦懷古詩各十首旋師捲斾旌賦哀周庾信脫繫晋荀罃生計從狼狽吟囊賸滿盈希賢才避地懷土重瞻衡晨夕聨南北薰猶愧弟兄蜂房苦屯聚蟻垤強經營㔉石開千丈疏池貯一泓林隂披帳幄泉響亂竽笙室靜雲常集亭髙月自呈小樓窗似柁欹榭樹為楹底物堪諧俗於中合著卿清歡足圖史公事屬杯觥佳趣兼寒暑忘機付晦明蓬蹤蝶自化塵網虎誰攖境習蕭閒慣思因寤寐生每觀辭社燕屢感坐衣螢野菊初含色靈椿正向榮行方衝落葉到及薦新粳暫使劍離匣永懷桃報瓊話言要的的意緒結怦怦地蹙沉三島天低礙八紘何當翹皓首相望入青冥仲生臨發再送之溪橋轉處即長途曉啓柴關見僕夫霜送新寒入襟䄂人將舊夢寄菰蘆黃塵路盡波聲急紅葉庭空月影孤若向西風問歸雁三春還憶北來無九日仲生去後弟數人來登髙適有風雨夕無月不盡歡而散又明日復至同飲月下籬花入酒香初發霜樹滿山黃未勻風雨重陽元不惡减將秋興是行人清池遙映酒杯空佳節雖過醉復同知我連朝無與語不堪獨坐月明中送菊者數人合十餘本皆云病雨故不佳對花獨酌輒題長句東籬叢花綻來久掩映青黃門外栁匆匆客至裹巾迎頭上淋漓灑餘酒飱英豈是擬三閭避厄寧須卜重九偶然興與髙秋謀何物堪和杯在手愛將佳色助清吟不分拘儒能藉口自居君子託朋儕冨貴斤斤排向後雖評賢聖立等差􅌂命公侯奉圭卣幽人一笑返無名卉木緣時本芻狗比䝉好事致霜葩烘染枯寒洗塵垢漫云蕊細葉凋殘入我窗扇總瓊玖天公晴雨自年年舉世空勞競妍醜更呼缸面酹淵明謝去諸君吾與友贈善釀王生家當後樂橋嵗釀范泉水罋底畢卓眠牀頭杜康祀自言收得深山春老向其中風味真雖無仙侣逡巡術合與人間麴米親我居橋東泉繞屋年年酒近重陽熟傾杯色映一池霜入口香分滿瓶菊每臨虛柁飲秋晴羣季爭誇坐客驚盡道兵厨容阮尉寧知紀叟隱宣城將以醇醪畢吾世籍手相供足酣醉醉餘飛夢海山顛舉爾蓬萊充酒吏山莊送山藥一本大於臂重幾三斤蒸而食之纍日乃盡深山積嵗飬難成便腹連朝飽尚贏誰信酥陀天上有即看石髓洞中生烹煎减處知心淡餅餌拋將覺齒輕更為幽叢覓花犬殘軀擬從赤松行夜大雪口占夢傍寒林半不成宵分雪色射帷明明朝門徑知埋沒聽徹窗前折樹聲題十三叔佚老庵齊年臣叔健白首嗜遺經舊著潜夫論新成陋室銘抱憐文若幼談許阿咸聽縹眇天文裏誰占處士星大雪彌日子弟來共飲昨日至城中冒雪獨來去衣衝郭外寒屐折池邊路今朝啓扉視荒砌積已深城中人來言門巷幾莫尋里居四十年不憶有此雪應緣心識清始見今竒絶園如水面雲黏天平不動山川與城郭盡作湖濤湧千林復萬樹殊怪不可圖紛披珠瓔珞爭聳白珊瑚對之心怡曠亦覺興蕭索緬想山隂人風流竟誰託何意二三子相携陪醉遊茅簷晚吹發恍惚漾輕舟晴日即目大雪連日夜始知天地寒午晴携杖出清景不勝看山倚城髙潔池凝徑渺漫千重氷壑底賸著一袁安懷仙詩氷雪覆大地思從天上臨五山將四海晃耀復森沉鶴翅度無影颷輪行有音猶憐壺嶠客跂足發寒吟飲新酒戲成户外氷稜增刻削杯中風味足清醇不知朝暮有寒意所與往還惟聖人兒姪同希小阮逹雲烟偏向老顚親醉鄉密邇何須羡欲寄和神國裏身哭四弟稼民嵗晚荆花尚滿庭一枝帶雪忽凋零長貧浪學朱公術久病虛參岐伯經宿世心塵誤鄉里平生手迹倦丹青北風送響東陵下應供殘魂怨脊令老僧復宗來唁山僧踏雪過山翁老病同棲隙影中說著存亡渾障礙只將無語破頑空得天津書知滄洲同年劉師退健在師退幼學禪觀童稚情親五十年浮沉蹤跡兩茫然經過初見霜生鬢相望長如月在川貧久原思兼抱病醒多蘇晋本逃禪海山他日期携手何必求歸兜率天書又云王南村自知亡日沐浴具衣冠拜母無病而逝迷漫欲界隔仙都老向烟霞憶舊逋贏得翛然揮手去得如輔嗣守門無得仲生書及江南親友消息懷人三月意黯黯雪送深杯欲半酣接得報書翻不樂重牽離緒到江南江聲悽惻動心魂侍立兒童訝淚痕除却黃泉音響絶藥爐側畔有人存鄉人苦覓余書猶子鈎摹一幅以紿之余聞而取觀戲贈二絶句且為書數紙己酉不擬牀頭故捉刀那將刻鵠誡兒曺十年粗識蘭亭面偷取家雞炫羽毛秋曉輕隂黯不開請君自掃小庭隈乍驚天外雲雷氣此日真龍始下來庚戌新春遙贈舊門下士公車北上在三往語底須論凖擬登朝不負恩此去汝南門下過譬如今日入東門口號茫茫塵海沒天真虛谷無聲好問津延得希微駐靈府一心長作守門人小庭栽竹比遂成林對雨題長句王猷故是瀟灑人一日不可無此君少陵不保破茅屋必種數竿聊免俗我從山家移竹來正當醉日劚石栽比年雨多易成長新梢戢戢穿簷上搖風漾月六十竿昔時盈尺今踰丈曉隂連山收火雲乍愛林響踈踈聞七賢六逸隨流水長嘯獨搴青鳯尾阿趁周嵗戲題觀其取物先筆後劍老愛佳孫子從教溷乃公齒牙氷雪凝去聲言語栗留工提劍非吾素抽毫有父風朝朝潁川郭抱汝著車中壬子始春十有一日己巳夜夢與老翁對坐觀周易遂為余卜得同人之遁其繇則七言絶句也既寤惟憶首句及第二韻乃足成之江聲海氣入詩瓢汨沒吟魂未易招夜半東風吹夢覺鐵船元在華山椒春感年光易換似流鶯老覺心期暗不驚華屋山邱等零落風花烟栁慣清明林深自許鷦巢穩道險誰甘鼠穴爭却被陽城要上考閒閒十畝意難平清明後大雪泠泠鶴語遡唐堯卯酒微曛抵敝貂氷雪陡侵三月迅陽春恍憶十年遙有知社燕飛飛晚無幸園花灼灼凋借問漢廷賢丙吉八荒寒遍若為調題王臨川集熙寧名績惠惇聨千古江山氣慘然玉茗堂中詞客在始應替得謝臨川夢在吳門李萊蒿侍郎握别云肯思我者惟有君耳寤而愴然遂成絶句啼烏喚淚落江雲斷夢分明太息聞三十年中萬賔客那無一箇解思君過梁莊望澗園同二十三弟感懷之作園已鬻之俗子矣依舊飛梁接釣磯臨流清淚不勝揮髙樓長閉窗三面新冡才營土一圍駔儈有時喧酒炙兒孫無恙隔林扉屋廬迥與人俱換千嵗何由待令威弟向居他縣近始返舍雨後即目好風佳霽變園林耳目清新莫逺尋淡竹映池千㸃黛陵苕緣霤一溝金朱魚羣作穿荷戲時鳥偏工食椹音不許老夫心便死靜中牽惹發微吟暮秋吟望小閣髙棲老一枝閒吟了不為秋悲寒山常帶斜陽色新月偏明落葉時烟水極天鴻有影霜風捲地菊無姿二更短燭三升酒北斗低橫未擬窺癸丑上元後病中作老為歡伯意躊躇路向窮時地有餘零落夢魂燈月後膏盲始是道人居贈日照秦生崑雪與其鄉人丁鶴亭李經五皆好學篤行逺聞海上三君子乍可三株樹並看一鶴翻飛臨澗户六經錯落起波瀾殘春羯鼓判花入晚道鹽車引驥難便合招携采芝客滄溟結隊理魚竿秦生言寧海州七真人故居烟霞洞者中有鳥其聲云歸山好令聞者作出世想至夜則杜鵑滿山悲啼不絶令人凄然腸斷道人並謂之仙禽余聞此語漫成口號世人勞夢復勞形鳥語相嘲不遣停才喚歸山又催去阿誰解向寂時聽明邉華泉尚書有詩云庭際何所有有萱復有芋自聞秋雨聲不種芭蕉樹前人謂其意取出象而芋非庭中之物譏為凑韻余則謂呼芭蕉作樹乃鄉俗之言尤為不典作者與譏者踈陋一也遂改之庭際何所有離離花藥苗自聞秋夜雨不復種芭蕉新秋園夜夜氣澄來耳觀平迎秋幾許攪心情山泉林竹窗風外更與添將蟋蟀聲病目自嘲昏眸老尚曵心旌雲母屏風就裏生韋卓便應傳道術文昌那敢競詩名信拋大地烟花色遙接髙天日月明舊友能來慰離索醉歌猶愛有聲情秋暑口占甲寅塵氛熱惱避無門短壑層氷役夢魂無語收身北窗下清凉元只此中存記夢十月十日七十餘年不可追夢魂常與幻參差三彭昨夜故嘗我一豫從今當格誰眼已逢人混清白心猶和月變盈虧分明記得崆峒語却是無知未易知因園集卷十三
