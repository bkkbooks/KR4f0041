front:
  text: 因園集跋今年秋重謁趙秋谷夫子於因園而夫子病目彌甚不作詩六年矣從仲君羮梅得夫子手定平生詩藁分十三集假歸録副未及校而羮梅遽索原本以去嵗寒無事乃校一過曩夫子手書濟南竹枝及宿法慶寺二律皆不在蓋所刪多矣乾隆辛酉除夕前三日門人丁際隆謹記
