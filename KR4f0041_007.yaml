body:
  text: 因園集卷七左贊善趙執信撰葑溪集微山湖舟中作舟前湖泱漭湖上山橫斜湖中何所有千頃秋荷花山雨颯然來風香浩無涯移舟青紅端飄若凌綺霞林光村逺近樓影帆交加疑是桃花源參差出人家流覽情所喜避地想更佳何必博望侯虛無乘海槎山陽題李學士惺齋鎧歸釣圖李侯抱微尚汨沒金馬門手持史臣筆夢為漁父竿天子不聽還益復崇其官入直殊蕭散退食乃吟歎釣臺歸老計挂口二十年於今欣得遂忽若籠鶴翻舊侣復相逢清淮照病顔髙官不可見但見白鬚繁顧笑韓淮隂遺墟亦荒煙信知黃閣尊何如秋水便我雖山中客屢刺江上船君其釣白魚來往為我餐暮雨過召伯鎮泊揚州風起鸛鵝鳴髙帆縱暮程湖翻遙海勢兩挾晚秋聲衰鬢三年客荒煙六代城清宵十里郭留月向誰明雨中過查編修德尹嗣瑮寓齋楊編修專木中訥亦至小飲志别二首二君皆在詩館憶别塵埃裏重逄江海間我來先落葉君含似深山松桂雨中緑書琴秋日間草年一樽酒新照鬢毛斑楊子翩然至相看淚轉揮九原知已盡四海故人稀騷雅時方盛漁樵道未非悲欣付酣醉岐路各翻飛專木先公少司馬余座主也去嵗新逝寄曹荔軒寅使君真州聞道髙樓臨水起使君坐卧此樓間帆檣競作魚龍戲賔客空和燕雁還唐代精靈應有屬曹實司詩館清秋煙月肯教間遙憐解帶銜杯裏收取江南幾許山江上阻風放舟下瓜步江逺海天逼初曦將宿隂繚繞絢秋色林聲發驚響野水動平碧風從東南來欲蕩𨝍溝直新潮復大上急雨更交射徒聞捩舵勤進寸退乃尺屢因欹岸轉漸與頺波即心豁津樹橫目懾洲煙坼中流本雄曠足逞馮夷力霆雷無節奏龍怪有跳躑是時憑舷人快意危疇昔翻思造化功不在通南北濤瀾可恆怒舟楫願終隔截然燥濕分倐爾往來息土風不相移民患從兹釋天聽方喧豗長謡竟何益雨泊虎邱十里浮圖影三年舴艋舟溪山總相識風雨復遮留煙樹空波映秋燈小肆幽橋邉憶斟酌遣夢與同遊虎邱有斟酌橋小舟沿葑溪至李萊嵩煦使君别業對飲話舊知王南村亦客此二首秋水迷城郭悠然小艇來碧溪新結屋端為故人開桐竹細含雨軒窗虛照苔心情無恙在未減昔銜杯寒日傳書逺去冬使君以書見招於天津江天鼓棹遲祗緣憂俯仰豈敢避旌旗迹已飄蓬慣身從道殣遺年來問生事賸被子猷知新晴與南村及張超然逺暫過虎邱虎邱好秋月我來逾所聞正當積雨晴亭午煙景新寺門畫舸集冶遊何繽紛顧笑萬衆中有此三數人櫛比見華館喧闐羅芳樽竹樹酒炙叢水石紅粉春云方初弦時歌管鬱未陳預愁三五夜客夢驚心魂臨髙野四望歷歷多松雲何人赴幽賞惟有清逺君因知習俗古彌感氣象尊廽棹同所適月明白鳥羣中秋與南村泛舟石湖望月王郎與我能無愁客中放棹尋清秋清秋了知在何許且逺城市辭歌謳胥江水洗天宇淨片帆輕駛如星流橫塘西去見山影蒼翠豁露霜煙收楞伽靈巖兩迎揖此中安得無夷猶湖光一曲縈我舟與子呼酒相勸酬以湖為酒恣拍浮須臾湖月忽晃漾照映天上白玉樓鬚眉蕭颯風颼颼飄然疑墜海外洲却視人世真蜉蝣我已一身隨落葉子亦一官成贅疣不見吳越俱荒邱魚城酒城何處求伍胥種蠡同浮漚惟有石湖湖上月曽照石湖居士遊西施溪畔餘溫柔坐中微笑寒花羞子既醉矣我未休廽帆撾急不可留夙昔中秋有此不令我却憶西湖頭小舟曉入閶門至葑溪口號四首閶門進船處星沒逺雞鳴舟子暗相喚遙分蕩漿聲太陽欲上時比户人未起一點曉光鮮先落儂船裏臯橋猶衆橋豈有雲虹駕苦為梁伯鸞低頭出其下燕壘向空懸蜂窠臨水聚小門一一關不辨垂竿處九日石湖前日石湖氣澄徹惟照碧山與明月今日石湖勢紛綸長篙短楫多於人我過橫塘沽斗酒欲與鳧鷗作重九中流且去恣逍遙月來人散湖蕭蕭月夜重過彩雲橋口占湖山索莫夜迢迢霜信風中酒易消還是秋來可憐月照人獨上彩雲橋送孫發舟北返漸老情懷劇耐秋暮寒掩抑獨臨流從今夜夜還家夢一半分將傍汝舟偶過滄浪亭十二韻間闊滄浪甚間行一暫窺簷楹晴日好荷芰晚秋衰徑入延緣仄池懸略彴危新亭芳宴數舊物石枰疑勝豈東南盡花將富貴移每聞呵殿至轉恐鷺鷗知憶把松枝麈曽通藥石規風流寧足競誕傲竟何辭蜀國登牀日樊川索笑時由來主壇坫不在倚旌麾蕪沒都官渡蒼涼刺史祠九京呼子美相賞詎關詩蘇州府學雜題四絶南園千畝任流螢誰為王家更勒銘一種迎春與消暑皆錢氏亭臺名時人賸上道山亭學中土山名五柳風流自得師爭教劉白敢同時木蘭堂裏分明道千古清香屬左司韋公祠合向宫墻厠一隅草年遺愛倍霑濡後來好事思鄰並却是千金買得無湯公書院短籬破屋廣文貧竹徑蔬畦野客親落日西風聞鼓角披襟無限庾公塵飲泮池木芙蓉畔贈學博士微霜入紅蕚臨水色更好不以地間淡遂使意枯稿清樽戀池上皓月窺林表秋靜夜澄明與君展懷抱師子林贈主人張籲三士俊髙亭擅一邱怪石擁四面坐疑夏雲起顧覺秋山亂初窺惟谽谺漸歷有登踐區分澗壑成徑紆尺咫變深洞轉地中飛梁出簷畔前行鳥投巢後至狖緣棧峯巒入衣袖松桂吹霜霰猶被元時苔復充目前玩我本巖穴士繭足攀躋慣羡爾市㕓居閉門恣幽竄又絶句才華敢擬鹿門生佳士相看合有情滿屋藏書滿庭石如君便是二遊并出郭扄户坐煙水不知秋已深偶然浮小艇出郭見霜林初日照溪色微風吹棹音試與清絶處聊繫欲歸心夜抵常熟宿攬秀東軒感懷庚辰省故座主翁大司寇留止兩月秋暮辭歸遂為永訣壬午夏暫至不宿此軒華燭清樽識鬢霜重來又過五重陽馬公禮樂空相付陸氏田園已盡荒東閣郎君還下榻西州義故獨霑裳黃花零落和寒雨憶引彭宣到後堂虞山有吾谷谷中楓林甚盛將往觀而諸子請俟明日余不可遂載酒遊焉夜歸輒雨逮曉彌甚為長句簡同遊者楓林蕭森新得霜虞山佳處雲錦張昨來拿舟隔十里暝色為我開纁黃晨朝故人許鄉導舉趾倐欲從風翔臨行胡然有改計道傍築舍空回遑郭門西去不五里詎要卜吉仍舂糧勝境到眼棄不取山靈應笑癡非狂煙溪一棹檥谷口幽徑頓入秋茫茫萬夫羅列何崒嵂亂霞飛墮紛披猖丹砂翠羽不可别交枝動影爭斜陽何年髙人參造化手植巨麗留山岡青女有情妙點染慘淡耻與春頡頏我曹寄身殊恍忽絳宫碧落仙人鄉同來少長數得七潦倒誰是籍與康中林纍纍見邱墓對此安得辭壺觴昏夜呼火照豪舉燈燭映樹收光芒醉歸揮手興未盡後期一昔寧荒唐東軒靜卧雨驚夢猶疑落葉投匡牀天明起坐忽自笑始願若失今難償人生快意及旦暮莫令事過徒感傷諸君畏濕幸不出他時秋雨莫相忘對雨憶破龍澗呈王西澗材仕同年近卜居虞山絶澗實泓峥剩境亦幽異松風橋上下客夢時一至將老子已營暫往我未遂最憶石上苔晶瑩點寒翠胥江曉泛有懷南村寒煙漠漠曙江平柔櫓何心有送迎忽憶隔窗人草草渡頭和月喚船聲寒夜與張漢瞻雲章食蟹葑溪公子排寒來風味乃出太湖上蟹即城外池中出登盤乍晃赤玉光入手猶驚怪石狀金膏雪膾與口冝把酒持螯覺神王竹林飲户竟參差稷下談鋒互雄長張不飲燈前爾雅再三讀明日懸知各無恙莫將羊酪調茂𢎞定有魚箋酬魯望數過前長洲令陳燮公治䇿僑寓園池二首彭澤何須去桐鄉定可居髙蹤三江水長物一牀書故吏教賖酒寒畦自擷蔬慙君謬恭敬猶為病相如相近門如對頻來鶴亦親霜池空映月板屋小冝人僮僕形骸忘去聲交情放廢真江東舉杯侣誰復似陳遵雨中與燮公同舟過萬里橋久客間故佳微雨出不厭舟如鳬孤躍人與萍同泛曉溪呈宿淨霜葉送餘豔棹意入煙輕山姿向寒斂深情屬促膝狂興引掀髯雲重喜爐明風嚴知酒釅人生快朋儔流落何足念萬里起船頭蒼茫詎能纜秋憩軒贈海寧陳副使傅巖世安幸自城中隱於人息外求前榮虛受日小沼淨涵秋有子續書卷留賔分酒籌逍遙君已領鵬鷃任同遊翁雲木餉酒及鳬翁名橒居洞庭東山我聞東西山下臨三萬頃人參水仙居地與洞天併常通縹眇夢虛對明月影欲往畏風濤今冬湖水大上披圖但引領君過詫靈勝比日聽清省伻來致醇醪一啜得雋永慧山光自隱南潯氣莫逞恐是林屋開瓊液漏塵境殘燈共微酣竟夕失孤冷更見素盤中珍禽燦雙頸身手鬱未試口腹默已幸終擬縱幽探况煩屢勤請春波帶氷消煙棹當風整期君梅花時香雪滿諸嶺問訊傅巖卧病酒闌曽憶共􅑀闌池上蕭蕭惹暮寒乍可藏身耽屋暖未容伏枕送冬殘遙憐翠袖如雲侍時放清眸似電看陳多姬侍廡下故人空弔影待君強起勸加餐代滄浪亭送别滄浪亭子春無主亭下寒波泣為雨北風一夜山自移城中百萬人不知朱闌綺疏將誰託過客長吟向寥廓可憐百本洛陽花更為東君幾開落湖州長史驚破顔還我舊日荒溪山溪山有靈面發赤此年但就東家食髙天慘淡連春隂雷雨一洗亭蕭森欲知去後懷恩者精舍僧雛獨抱琴傅巖頃疾愈以書來云已遣之故鄉致佳釀須至同醉二十韻訊之孟公自雄豪偶疾乃易起終依磊砢流肯效兒女子昨日讀我詩大笑非知已身騰元龍牀筆奮仲連矢咄咄來逼人洋洋遂盈紙相勞無幾言取醉其大指致師勇欲賈成列時猶俟逺信要麴生越在東海涘我昔渡浙江頗嘗飲清旨聞之色飛動瞑坐算煙水連朝積霜霰失計困泥滓豈無賢人來都未具妙理迹寄偶褌中夢落恆甕底大聲呼芳醪須女澆塊壘極知虎難攖尚覺獵可喜公明膽忽剛子反敗何耻請君趣白墮更為馳黃耳勞逸固不齊客主各有恃雲龍許追逐虞虢羞脣齒天下健者誰但容壁上視贈阿童史生小僕也余飲酒須熱惟阿童能供之不失其度故贈以詩南人飲酒如飲水細掬甘泉潤牙齒北人飲酒如飲湯腸熱不願生微涼南人北人互相笑並坐茫然判寒燠我為諧語卿無嫌北人自北南自南吳中賢豪遞開宴愛我踈狂日相見酒行到口儼未嘗却指金樽頻索換僕人嚬蹙煬人嗔立監佐史皆逡巡阿童阿童絶解事為我執爵留陽春芳醪吐雲杯炙手霓吸鯨吞落誰後襟懷浩蕩膽輪囷憶向他家未曾有主人愛客僮能知客於此後來無時劇憐北去山齋夕對酒歡騰獨爾思題春墅晚歸圖春風開花花滿家主人出看江頭花朝和卯酒上驕馬嘶入春風藤笠斜江頭日日人如織主人何人不相識昏酣不覺往來頻到處據鞍傾一石長江解渴無時醒快意但與花逢迎青春未肯私白日曖曖西山煙景逼歸時翻訝日能沉委轡垂鞭為花惜馬前呼門聲欲低主人醉夢花猶迷顧霖蒼索贈歸心如殘歲飄忽不可止既發復停橈乃為二三子虎邱往來會相送每彼此住久混鄉關裴回臨水涘諸君亦恨恨不與他時似我何以得斯坐中慨然起憶從客名邦已閲兩星紀知交間新故投契存終始歷畹采芳蘭摉林賞杞梓愧非晏相賢謬荷季札喜半生纍踈狂所至足嗤毁豈知在詩中竟未遺一矢酒樽注江河詩律錯宫徴初猶隔形骸近欲浹肌髓風流固易散苦樂本相倚欲知别時情請喻聚時指長康索贈言我意正難已便恐雜慘悽何心競恢詭把袂且須臾登艫即千里去去從此别人生偶然爾虎邱留别相送諸子北風何意阻歸舟海湧山前半日留轉覺離心劇楊栁寒梅初發小橋頭更與諸君各盡觴擬將酩酊敵凄涼文通多事關人别管領銷魂只杜康白舫青樓習醉翁湖山花月興何窮經遊一一俱無恙贏得臨行似夢中梅雨菰煙處處冝前身自笑是吳兒即看相送人如許不信參差隔夢思因園集卷七
