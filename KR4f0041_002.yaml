body:
  text: 因園集巻二左贊善趙執信撰閒齋集送同年馮大木舍人校士湖廣春秋鬻熊國强大割周甸壤地盡荆梁雄風帯江漢中分齊晉霸外並秦吳悍三戸竟亡嬴遺烈發項難當時盛兵力逓世優文翰莊屈引商音朱絃𣺌餘歎邇日頗衰靡聲格就雌懦才豈敵國用瓜待梁人灌吾友馮舍人詩思掣驚電蹔輟秘閣直不愧中朝遣振衣黄鵠磯搴芷碧湘岸楚士競磨厲治韅靷鞅絆兩廣嚴權勁三秋耀組練看君建大旗一鼓萬色變徹札養叔登蒐蒍得臣薦前年我往晉力欲追舊觀勢已弱古昔時會多謗訕厚乞汾晉靈小覺耳目換於今論文事毁譽雜真贗主盟不相下牛耳爭欲擅邾滕為人私門戸紛難算吾儕亦分道相視各笑粲兩賢既莫避計畫須早辦楚自長宋盟晉實先魯傳雖聴向戍成不免薳疆諫一彼與一此事後互譏羨我方怙鄢勝君請力邲戰彬彬晉楚從來歳交相見送吳天章之太原二首秋雨勢不已秋風動萬山送君薊門路計日井陘闗水暗黄榆色峽迴青玊顔猶餘馬行處憑夢一追攀青玉峽在井陘把酒説并州茫茫感昔遊邊聲催月曉山氣壓城秋桑落經時醉黄花九日留君歸渡汾水為問雨中舟贈李生生宣城人能星緯兼相人時將歸矣李生烟霞人至道窺窔奥有術不自匿變怪出談笑往為嶺海遊列郡恥晩到朅來長安市一日屈衆妙傳聲疾雷霆摉訪逮形貌輿𨽻熟招邀公卿藉炫燿相知我最先竒技向亦好每同宋忠載過請季主教干支重爬羅頭面久量校勸我忍貧下計日許騰趠感子鄭重意失喜還自悼生本田野夫一第良忝冒早仕乏問學行意成輕傲閒官慙報稱孤立叢謗譙常憂忽失墜知病竟莫療天時子有徴人事我所料子今欲歸去舊山譜清嘯索詩持當劵不貸王孫報何殊俟河清未必同燭照覬子言屢中萬一此亦效待我乘星車請子理烟棹贈賄恐未能逺當遣迎勞送費生赴淮上燕市居十年酒徒能幾箇假使設壇坫我將子當佐僦屋一僻巷氣味兩寒餓招請無昏旦主賓雜坐臥狂或怒朋輩醉不避驚邏世事如瀾翻舊歡與夢破子今結束去幕府據髙座騎馬到淮南猶及嘗新糯我方持筆札計日按程課心隨知舊散氣以貧病挫海門波澎湃薊北塵堀堁銜杯逓相望獨唱誰與和送同年梁原山吉士改官歸太和西江人士意氣豪潯陽九派飛寒濤吾黨梁子尤駿發雄視不覺霜天髙姓名早入玉堂籍十年削跡棲蓬蒿今冬强起赴銓部俄看換職歸諸曹主者用人有深意衆口不解徒嘈嗷尚書事重繫民命竿牘山積煩爬搔年少諸郎習疎放止堪持酒談風騷木天清曠足容納坐令戢戢同牛毛如君才力豈易得列卿端藉分憂勞鴻鵠一舉不可網復欲息羽投林臯蹔歸聊以慰慈母驟别豈免傷同袍酌酒勸君好自愛南下催馬風如刀與同年李丹壑編修以事出朝陽門晩宿田家繁花已盡木葉肥城中城外塵交飛不因出郭了公事當與野色終相違芳春三月鍵戸坐日在愁陣遭重圍我自久旅成習慣今昨等耳安知非怪君連歳臥江上捨舟即陸誰指揮今朝眼豁向水木翻若所見從來稀清溪宛宛帯櫸栁村舍歴歴通烟霏故山未敢詫竒絶風物似此猶庶幾人情厭常每易動微官竊禄難肯歸且買濁醪酹暮景新月正照林間扉夜雨有懷丹壑臥聞簷瓦添新響坐愛虚窗受逺風不忘對牀前日約夢隨雨脚過街東題程松臯舍人詩巻四首四海故人楊伯子海寧楊耑木春來幾度説君詩城東記否雞羣裏標格亭亭識項斯昨日叩門日卓午槐陰入座風披猖尚覺歸來太蕭瑟袖中冰雪生清凉宋唐門戸久難齊頗怪康莊俗自迷要識神明煥然處非縁野鶩勝家雞時人口齒競呀咻字順文從解辨不苦厭支離塵滿眼期君濯足大江流觀奕歌髙堂晝閒棋局陳隠然左右敵國分主人與客據四角宛若勢子何停勻微風動窗日光入簾影欲亂楸枰文未知失鹿向誰手但見眼底生紛紜乍如青天歛餘靄一南一北行秋雲又如殘日墮西極大星小星耿不昬豐隆驅雹撒沙落毛仲牧馬雲錦屯肅肅魚麗就行陣翻翻鳥散隨飛塵觀者坐久失向背目瞠舌撟傷心魂良工運斤色不動森然萬枝同一根攢眉思出九天上奮袖氣奪千人軍少焉勝負判然决誰與戚戚誰欣欣古來兩賢不相厄何況同道猶一身尋讐伺隙有何故日斜人散寧復論嗟乎世間强弱終無據空遣旁人笑相語謝王子言前輩餉酒偪仄曽同巷南北每看屋角即相思雨添庭際汍瀾處風攪窗前竹樹時無復罇罍邀我共坐愁泥淖出安之今宵遣入去年夢一枕簷聲成醉遲夜大雨曉起視庭際花竹有述八韻夜半夢驚雨天明庭浸波幾迴臨牖視何異泛舟過砌失開花滿堦餘襯草多長條疑折葦圓葉作翻荷獨有幽窗竹依然緑玉柯當風轉孤挺帯濕自婆娑應結蒼松伴相期碧澗阿秋霜凋衆卉爭奈此君何七夕雨飲松臯舍人分韻得九佳與汝結交異行路三日不見無好懷寒官多暇還往易不以風雨成暌乖更番既已倦輿僕蹤跡豈免疑朋儕論詩相賞由宿分語似驚羨實嘲諧詞塲近來盛稂莠雖有條蔓亡根荄楚相衣冠惑左右狡黠終是輸優俳我曹岐趨有何故苦向漫漶求模楷河漢今夕事荒怪妄者以意窺津涯丈夫要自識真意恥逐俗子由由偕所憂學嗇難樹立山嶽勢就誰能排談深不畏口枯渴主人有酒如長淮扶醉出門風滅燭天光照泥星滿街入夜開霽杜門小病杜門殊不惡静中一倍愛秋清微寒牀下王孫急細雨籬根稚子生閒覺詩懷増攪亂貧餘酒債費經營新來自笑躭工課半夜披衣看月明秋熱西風不作力大火張餘威雷雨呼莫應毒熱來非時七月月向盡午汗已去肌昨夜夢顛倒謂是初炎曦曉窗日潑眼如臨洪爐窺翻身欲起避衾簟黏膠􅤽灑掃就厞隠嬌兒啼相隨藏冰日十市怒詈來何遲暑寒代有常奚由失其宜太寛以猛濟遺愛傳良規琴瑟忌專一改絃待工師敢持區區意仰訴皇天慈節候今年節候太支離獨有閒人次第知暑似飢鷹戀鞲久凉如隠士出山遲昨來一雨醒塵夢陡覺清秋赴夙期日午當窗看竹色微風捲緑入簾帷中秋例相餽遺貧家此事都絶友人頗有以酒見餉者喜而為詩昨宵細雨洗餘熱卧聴寒聲汎窗竹今朝晴天作好月坐待清光媚幽獨令節屈指不三日比舍喧喧走僮僕寒家無往亦無來閒看炊烟上墻緑故人相知到嗜好美酒逓致車連轂未放狂夫杯入唇已見癡兒歡聒屋豈少貴人相餉遺珍味充口帛盈簏因思天公換嵗時賸遣朱門臭新肉中厨佳醖賤於水涓滴如余已霑足質衣更為買蝤蛑不遣便便負此腹却笑阮公無好懷官酒自供何事哭不學碧鸛裴家郎寂寞荒園自埋鹿贈錢塘吳舒鳬因懷河中吳天章吳子意軒豁有似髙秋鴻息羽就塵坱鼓翼隨天風矯然衆鳥中一奮千羣空却顧望寥濶誰與為兩雄河上中條山遙對蓮花峯峯壑相遮羅青翠幾萬重中有棲託人帯蘿衣芙蓉長嘯臨闗門濁浪聲相舂與子才匹敵姓氏正復同並揚騷雅波交暎氷雪容聞當蹔來此晉楚中原逢何故先避去不肯交刀弓故山結茅處秋色寒濛濛湖如新磨鏡照見松桂叢苟能縱髙卧投老安耕農不然逺遨遊自等無根蓬作詩貴言志飲酒聊快胷時世方妬色賢達當固窮彼吳昔顦顇上書不得通丈夫能文章豈必為三公為舒鳬題吳山草堂兩峯相憶不相識中著茅亭定可憐那更西湖似西子横陳日日小窗前送朱悔人歸潛江霜信風髙塵滿衣征人遙與雁南飛凄凉客向秋深别珍重身當亂定歸松竹從添三徑合江山無恙十年違翻愁未抵他鄉樂去日親知有是非孤酌短燭照孤酌長宵容苦吟窗虚聞雨細人静覺秋深兒女迎寒病鄉園久客心無因得料理爭遣不侵尋即目烟外風翻數㸃鴉板墻欹處夕陽斜空庭客去閉門晩零落一堆紅豆花戲孫子未檢討病瘖學奕孫郎甚口如蟲鳴嘈嘈頗為流俗憎冬來肺病漸作啞歘與雷鼓齊收聲齒牙翕張不達意翻怪賓客皆重聴身手雖好欲安試寒天瑟縮閒無營今晨書來語刺刺終遜舌本工掀騰假我棋局破岑寂何異臏脚初修兵北風激箭射窗紙黑白在手如凝冰短燭前頭置酒盞夜長椓木聞丁丁吾黨躭奕獨馮子淩厲同輩誇最能閉門今知勇可習便擬齊晉相代興勸君且止勿自苦料理藥具兼茶鐺弛弓櫜矢備不用蹔依律吕調簫笙他日臨敵戰偶勝髙歌奏凱喧鼙鉦有時意外值强悍一叱可使樓煩驚和大木除夜作君子敦夙昔纎人艶鮮新荒哉眼底歳欲變風中雲鄰舍兒女歡遲明作好春寒家燈火靜夜久杯在唇巷柝入耳急妻子倦相嗔酣眠非不適所戀在逡巡昏眸漸不支倚壁强欠伸恐有鄉夢迴夢見平生親馮生發歸興奮作孤鴻鶱余豈異人情悲懷難可論十四夜對月寄丹壑是日立春春風寒近酒杯前街鼓聲中夜可憐愁向東窗見明月故人居在月東邊閒閒憑書巻添眠味暗刻窗陰覺日長暖色待將花打疊春懷須著酒禁當感興二月不見雪積凍已潜消融為夜分雨客枕驚蕭騷曉晴日氣鮮餘寒不敢驕起看小庭竹覆砌青寥寥枯草亦茁芽瑣細新雛毛託根久泥土今與陽春遭稍見雲際鳥飛鳴何交交萬物各有時終戴造物勞調丹壑二首張侯邀我入城去西苑水風終日凉却笑人間李公子出門十歩似他鄉每欲嘲渠等蟲蟄新來看爾似蠶眠除將善病兼能酒百不如人也可憐芟竹抱節久相於因多自翦除一朝窗影瘦昨夜雨聲疎不惜衰晩日翻憐移植初新梢當戸好著意九秋餘梅耦長畫幅只合歸與卧一邱松門蘿徑足清幽誰教老樹旁邊立黄葉無風也打頭因園集巻二
